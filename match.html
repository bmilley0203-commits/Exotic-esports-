<!DOCTYPE html> 
<html>
<head>
  <title>Phoenix Matches - Exotic Esports</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
    }

    header {
      display:flex;
      justify-content:space-between;
      padding:15px 20px;
      background:#000;
    }

    .dropdown { position:relative; }

    .dropbtn {
      background:#222;
      color:white;
      padding:10px;
      border:none;
      cursor:pointer;
    }

    .dropdown-content {
      display:none;
      position:absolute;
      right:0;
      background:#111;
      min-width:160px;
    }

    .dropdown-content a {
      display:block;
      padding:10px;
      color:white;
      text-decoration:none;
    }

    .dropdown:hover .dropdown-content {
      display:block;
    }

    h1, h2 {
      text-align:center;
    }

    .section {
      text-align:center;
      margin-top:30px;
    }

    .match {
      background:#222;
      margin:20px auto;
      padding:20px;
      width:400px;
      border-radius:12px;
      transition:0.2s;
    }

    .match:hover {
      transform:scale(1.03);
    }

    .teams {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .team {
      text-align:center;
      width:35%;
    }

    .team-logo {
      width:60px;
      height:60px;
      object-fit:contain;
      border-radius:50%;
      background:#111;
      padding:5px;
    }

    .score {
      font-size:22px;
      font-weight:bold;
      width:30%;
      text-align:center;
    }

    .maps {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:6px;
      margin-top:8px;
    }

    .map {
      background:#333;
      padding:4px 8px;
      border-radius:6px;
      font-size:12px;
    }

    .map.win { background:#4CAF50; }
    .map.loss { background:#f44336; }

    .winner .team-logo {
      box-shadow: 0 0 15px #4CAF50, 0 0 30px #4CAF50;
      animation: glowPulse 1.5s infinite alternate;
    }

    .loser .team-logo {
      box-shadow: 0 0 10px #f44336;
      opacity:0.7;
    }

    @keyframes glowPulse {
      from { box-shadow: 0 0 10px #4CAF50; }
      to { box-shadow: 0 0 25px #4CAF50; }
    }

    .win { color:#4CAF50; }
    .loss { color:#f44336; }

    .vod {
      margin-top:15px;
    }

    .vod iframe {
      width:100%;
      height:215px;
      border-radius:10px;
      border:none;
    }

    .vod-btn {
      background:#9146FF;
      color:white;
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    }

    .vod-btn:hover {
      background:#772ce8;
    }
  </style>
</head>

<body>

<header>
  <h2>Exotic Esports</h2>

  <div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="phoenix.html">Phoenix</a>
      <a href="cobras.html">Cobras</a>
      <a href="socials.html">Socials</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<h1>Phoenix Matches</h1>

<div class="section">
  <h2>Results</h2>
  <div id="matches"></div>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1ugrvbUq0TojcDY4fzPGhwtx6S-xUPNItfIexsY8z_Nw/edit?usp=drivesdk";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    const container = document.getElementById("matches");

    rows.reverse().forEach(row => {
      if (!row.trim()) return;

      const cols = row.split(",");

      const team1 = cols[0];
      const team2 = cols[1];
      const score = cols[2];
      const mapsRaw = cols[3];
      const winner = cols[4];
      const vod = cols[5];
      const date = cols[6];
      const format = cols[7];
      const logo1 = cols[8];
      const logo2 = cols[9];

      // Map parser
      const maps = mapsRaw.split(";").map(m => {
        let parts = m.split(":");
        let name = parts[0];
        let rest = parts[1] || "";

        let result = rest.trim().startsWith("W") ? "win" : "loss";
        let scoreText = rest.replace("W", "").replace("L", "").trim();

        return `<div class="map ${result}">${name} ${scoreText}</div>`;
      }).join("");

      const team1Class = winner === team1 ? "winner" : "loser";
      const team2Class = winner === team2 ? "winner" : "loser";

      const matchHTML = `
        <div class="match">
          <div class="teams">

            <div class="team ${team1Class}">
              <img src="${logo1}" class="team-logo">
              <p>${team1}</p>
            </div>

            <div class="score">
              ${score}
              <div class="maps">${maps}</div>
            </div>

            <div class="team ${team2Class}">
              <img src="${logo2}" class="team-logo">
              <p>${team2}</p>
            </div>

          </div>

          <p class="win">Winner: ${winner} (${format})</p>
          <p>${date}</p>

          <button class="vod-btn" onclick="toggleVOD('vod${vod}')">Watch VOD</button>

          <div id="vod${vod}" class="vod" style="display:none;">
            <iframe src="https://player.twitch.tv/?video=${vod}&parent=localhost" allowfullscreen></iframe>
          </div>
        </div>
      `;

      container.innerHTML += matchHTML;
    });
  });

function toggleVOD(id) {
  const vod = document.getElementById(id);
  vod.style.display = vod.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
