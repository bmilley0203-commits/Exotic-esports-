<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exotic Esports</title>
<link rel="icon" type="image/png" href="logo4.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  color: white;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #0a0f14, #05070a);
}

/* PARTICLES */
#particles {
  position: fixed;
  inset: 0;
  z-index: -2;
}

/* BACKGROUND GLOW */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,234,255,0.14), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,180,255,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(0,234,255,0.08), transparent 50%);
  filter: blur(22px);
  z-index: -1;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(14px);
  background: rgba(8, 12, 18, 0.7);
  border-bottom: 1px solid rgba(0,234,255,0.25);
}

.navbar h2 {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;

  background: linear-gradient(90deg,#00eaff,#ffffff,#00eaff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 4s linear infinite;
}

@keyframes shine {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* NAV LINKS */
.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #00eaff;
}

.nav-links {
  display: flex;
  gap: 18px;
}

.nav-links a {
  color: #00eaff;
  text-decoration: none;
  transition: 0.3s;
}

.nav-links a:hover {
  color: white;
  text-shadow: 0 0 10px #00eaff;
}

/* EXO CIRCUIT HIGHLIGHT */
.nav-links a:last-child {
  color: white;
  border: 1px solid rgba(0,234,255,0.3);
  padding: 6px 10px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,234,255,0.2);
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px;
}

.hero img {
  width: 180px;
  filter: drop-shadow(0 0 25px #00eaff);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.hero h2 {
  font-size: 42px;
  margin-top: 10px;

  background: linear-gradient(90deg,#00eaff,#ffffff,#00eaff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 4s linear infinite;
}

.hero p {
  color: #9aa6ad;
  margin-top: 8px;
}

/* SECTIONS */
.section {
  padding: 50px 20px;
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

.section h2 {
  margin-bottom: 25px;

  background: linear-gradient(90deg,#00eaff,#ffffff,#00eaff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 4s linear infinite;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  position: relative;
  overflow: hidden;

  background: linear-gradient(135deg, rgba(0,234,255,0.12), rgba(0,0,0,0.85));
  border: 1px solid rgba(0,234,255,0.25);
  padding: 20px;
  border-radius: 14px;

  transition: 0.3s;
}

/* SHIMMER */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 60%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(0,234,255,0.35), transparent);
  transform: skewX(-20deg);
  animation: shimmer 3.5s linear infinite;
}

@keyframes shimmer {
  0% { left: -120%; }
  100% { left: 120%; }
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 30px rgba(0,234,255,0.35);
}

/* DISCORD BUTTON */
.join-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 30px;
  border-radius: 12px;

  color: #00eaff;
  border: 2px solid #00eaff;
  text-decoration: none;
  font-weight: bold;

  box-shadow: 0 0 15px rgba(0,234,255,0.4);
  transition: 0.3s;
  animation: pulse 2.5s infinite;
}

.join-btn:hover {
  background: #00eaff;
  color: black;
  transform: scale(1.05);
  box-shadow: 0 0 30px #00eaff;
}

@keyframes pulse {
  0% { box-shadow: 0 0 10px rgba(0,234,255,0.3); }
  50% { box-shadow: 0 0 25px rgba(0,234,255,0.7); }
  100% { box-shadow: 0 0 10px rgba(0,234,255,0.3); }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="navbar">
  <h2>EXOTIC ESPORTS</h2>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navMenu">
    <a href="index.html">Home</a>
    <a href="phoenix.html">Phoenix</a>
    <a href="cobras.html">Cobras</a>
    <a href="yetis.html">Yetis</a>
    <a href="socials.html">Socials</a>
    <a href="exo.html">Exo Circuit</a>
    <a href="about.html">About</a>
  </div>
</div>

<div class="hero">
  <img src="logo.png">
  <h2>Exotic Esports</h2>
  <p>Dominating the competition with precision, power, and teamwork.</p>
</div>

<div class="section">
  <h2>Why Join Us</h2>

  <div class="cards">
    <div class="card">Competitive Teams</div>
    <div class="card">Active Community</div>
    <div class="card">Content & Growth</div>
  </div>

  <a class="join-btn" href="https://discord.gg/GtKHY3dr3" target="_blank">
    Join Discord
  </a>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.fillStyle = "rgba(0,234,255,0.6)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
