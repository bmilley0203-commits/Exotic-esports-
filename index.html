<!DOCTYPE html>
<html>
<head>
  <title>Exotic Esports</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom, #000, #060a12);
      color: white;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      background: #0a0f1c;
      border-bottom: 1px solid rgba(100,180,255,0.2);
    }

    header h2 {
      margin: 0;
      color: #7fd3ff; /* softer blue */
      font-size: 20px;
    }

    /* DROPDOWN */
    .dropbtn {
      background: transparent;
      color: #7fd3ff;
      padding: 7px 12px;
      border: 1px solid rgba(127,211,255,0.4);
      border-radius: 6px;
      cursor: pointer;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      background: #0a0f1c;
      min-width: 180px;
      border: 1px solid rgba(127,211,255,0.2);
      border-radius: 6px;
    }

    .dropdown-content a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
    }

    .dropdown-content a:hover {
      background: rgba(127,211,255,0.15);
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* HERO (FIXED PROPERLY) */
    .hero {
      padding: 30px 15px 20px;
      text-align: center;
    }

    .hero img {
      width: 140px;
      margin-bottom: 15px;
    }

    .hero h1 {
      font-size: 34px;
      margin: 10px 0;
      color: #eaf6ff;
    }

    .hero p {
      color: #9fb3c8;
      font-size: 15px;
      max-width: 400px;
      margin: auto;
    }

  </style>
</head>

<body>

<header>
  <h2>Exotic Esports</h2>

  <div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="phoenix.html">Phoenix Roster</a>
      <a href="phoenixmatch.html">Phoenix Game Schedule</a>
      <a href="cobras.html">Cobras Roster</a>
      <a href="cobrasmatch.html">Cobra Game Schedule</a>
      <a href="bears.html">Bears Roster</a>
      <a href="bearsmatchs.html">Bears Game Schedule</a>
      <a href="socials.html">Socials</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<div class="hero">
  <img src="logo.png" alt="Logo">
  <h1>Exotic Esports</h1>
  <p>Dominating the competition with precision, power, and teamwork.</p>
</div>

</body>
</html>
