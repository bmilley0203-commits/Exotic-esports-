<!DOCTYPE html>
<html>
<head>
  <title>Exotic Esports</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom, #000, #050b14);
      color: white;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #0a0f1c;
      border-bottom: 2px solid #00bfff;
    }

    header h2 {
      color: #00bfff;
      text-shadow: 0 0 8px #00bfff;
      margin: 0;
    }

    /* DROPDOWN */
    .dropbtn {
      background: transparent;
      color: #00bfff;
      padding: 8px 14px;
      border: 1px solid #00bfff;
      border-radius: 6px;
      cursor: pointer;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      background: #0a0f1c;
      min-width: 180px;
      border: 1px solid #00bfff;
      border-radius: 6px;
    }

    .dropdown-content a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
    }

    .dropdown-content a:hover {
      background: #00bfff;
      color: black;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* HERO (THIS IS THE FIX) */
    .hero {
      min-height: 70vh; /* reduced from full screen */
      padding: 30px 20px 10px; /* MUCH less top space */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero img {
      width: 180px;
      margin-bottom: 20px;
      margin-top: 0; /* prevents pushing down */
      filter: drop-shadow(0 0 15px #00bfff);
    }

    .hero h1 {
      font-size: 48px;
      margin: 10px 0;
      color: #e6faff;
      text-shadow: 0 0 15px #00bfff;
    }

    .hero p {
      color: #aaa;
      max-width: 500px;
      font-size: 16px;
    }

  </style>
</head>

<body>

<header>
  <h2>Exotic Esports</h2>

  <div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="phoenix.html">Phoenix Roster</a>
      <a href="phoenixmatch.html">Phoenix Game Schedule</a>
      <a href="cobras.html">Cobras Roster</a>
      <a href="cobrasmatch.html">Cobra Game Schedule</a>
      <a href="bears.html">Bears Roster</a>
      <a href="bearsmatchs.html">Bears Game Schedule</a>
      <a href="socials.html">Socials</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<!-- HERO SECTION -->
<div class="hero">
  <img src="logo.png" alt="Exotic Esports Logo">

  <h1>Exotic Esports</h1>

  <p>
    Dominating the competition with precision, power, and teamwork.
  </p>
</div>

</body>
</html>
