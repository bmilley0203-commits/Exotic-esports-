 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exotic Esports</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0a1624, #02060d);
  background-size: 200% 200%;
  animation: bgMove 12s ease infinite;
}

/* BACKGROUND MOVE */
@keyframes bgMove {
  0% { background-position: 50% 0%; }
  50% { background-position: 50% 100%; }
  100% { background-position: 50% 0%; }
}

/* MOUSE LIGHT */
.mouse-glow {
  position: fixed;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,191,255,0.2), transparent 60%);
  pointer-events: none;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(5,10,20,0.6);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
  transition: 0.3s;
}

.navbar.scrolled {
  background: rgba(5,10,20,0.95);
  box-shadow: 0 0 15px rgba(0,191,255,0.3);
}

/* DROPDOWN */
.dropdown { position: relative; }
.dropbtn {
  color: #bfe9ff;
  background: transparent;
  border: 1px solid rgba(0,191,255,0.4);
  padding: 10px;
  border-radius: 8px;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: #0a1624;
}
.dropdown:hover .dropdown-content { display: block; }

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px 20px;
  position: relative;
  z-index: 1;
}

.hero img {
  width: 150px;
  animation: pulseGlow 2.5s infinite alternate;
}

/* LOGO PULSE */
@keyframes pulseGlow {
  from { filter: drop-shadow(0 0 10px rgba(0,191,255,0.4)); }
  to { filter: drop-shadow(0 0 35px rgba(0,191,255,0.9)); }
}

/* TEXT */
.hero h1 { font-size: 2.8rem; color: #d9f6ff; }
.hero p { color: #8fbfd4; }

/* FEATURES */
.features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.feature-box {
  background: #0f1c2e;
  padding: 25px;
  border-radius: 15px;
  opacity: 0;
  transition: 0.6s;
}

/* DIFFERENT ANIMATIONS */
.slide-up { transform: translateY(50px); }
.slide-left { transform: translateX(-50px); }
.slide-right { transform: translateX(50px); }

.show {
  transform: translate(0);
  opacity: 1;
}

.feature-box:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,191,255,0.4);
}

/* JOIN */
.join-btn {
  padding: 12px 25px;
  background: linear-gradient(45deg,#00bfff,#009acd);
  border-radius: 10px;
}

/* FOOTER */
footer { text-align:center; padding:20px; }
</style>
</head>

<body>

<div class="mouse-glow" id="glow"></div>

<nav class="navbar">
  <div>Exotic Esports</div>
  <div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="#">Home</a>
    </div>
  </div>
</nav>

<section class="hero">
  <img src="./logo.png">
  <h1>Exotic Esports</h1>
  <p>Dominating the competition with precision, power, and teamwork.</p>
</section>

<section>
  <h2>Why Join Us</h2>
  <div class="features">
    <div class="feature-box slide-left">Competitive Teams</div>
    <div class="feature-box slide-up">Active Community</div>
    <div class="feature-box slide-right">Content & Growth</div>
  </div>
</section>

<section>
  <h2>Join Exotic Esports</h2>
  <a href="#" class="join-btn">Join Here</a>
</section>

<footer>
  <p>© 2026 Exotic Esports</p>
</footer>

<script>
/* NAVBAR SCROLL */
window.addEventListener("scroll", () => {
  document.querySelector(".navbar")
    .classList.toggle("scrolled", window.scrollY > 50);
});

/* SCROLL ANIMATIONS */
const boxes = document.querySelectorAll(".feature-box");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});
boxes.forEach(box => observer.observe(box));

/* MOUSE GLOW */
const glow = document.getElementById("glow");
document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
