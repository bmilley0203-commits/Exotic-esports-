          <!DOCTYPE html>
<html>
<head>
  <title>Socials - Exotic Esports</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background: radial-gradient(circle at top, #111, #000);
      color:white;
    }

    /* HEADER */
    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:#0a0a0a;
      border-bottom:1px solid #222;
    }

    header h2 {
      margin:0;
      color:#fff;
    }

    /* DROPDOWN */
    .dropdown {
      position:relative;
    }

    .dropbtn {
      background:#222;
      color:white;
      padding:10px 14px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .dropdown-content {
      display:none;
      position:absolute;
      right:0;
      background:#111;
      min-width:180px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
    }

    .dropdown-content a {
      display:block;
      padding:12px;
      color:white;
      text-decoration:none;
      transition:0.2s;
    }

    .dropdown-content a:hover {
      background:#222;
    }

    .dropdown:hover .dropdown-content {
      display:block;
    }

    /* PAGE */
    .socials {
      min-height:80vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      max-width:1200px;
      margin:auto;
    }

    .socials h1 {
      font-size:44px;
      font-weight:900;
      letter-spacing:1.5px;
      margin-bottom:12px;
      text-transform:uppercase;
      background: linear-gradient(90deg, #fff, #aaa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .socials p {
      color:#aaa;
    }

    /* 🔥 FULL WIDTH BARS */
    .social-links {
      width:100%;
      max-width:1100px;
      padding:0 20px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:15px;
      margin-top:40px;
    }

    .social-card {
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#0f0f0f;
      padding:18px 25px;
      border-radius:14px;
      text-decoration:none;
      color:white;
      transition:0.3s;
      border:1px solid #222;
    }

    .social-card:hover {
      background:#1a1a1a;
      transform:translateX(6px);
    }

    .social-left {
      display:flex;
      align-items:center;
      gap:15px;
    }

    .social-left img {
      width:35px;
    }

    .social-text {
      font-size:18px;
      font-weight:700;
    }

    .arrow {
      font-size:20px;
      opacity:0.6;
    }

    /* PLATFORM GLOW */
    .social-card.youtube:hover { border-color:red; }
    .social-card.tiktok:hover { border-color:#ff0050; }
    .social-card.twitter:hover { border-color:#1da1f2; }

  </style>
</head>

<body>

<header>
  <h2>Exotic Esports</h2>

  <div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="phoenix.html">Phoenix Roster</a>
      <a href="phoenixmatch.html">Phoenix Game Schedule</a>
      <a href="cobras.html">Cobras Roster</a>
      <a href="cobrasmatch.html">Cobras Game Schedule</a>
      <a href="bears.html">Bears Roster</a>
      <a href="bearsmatchs.html">Bears Game Schedule</a>
      <a href="socials.html">Socials</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<section class="socials">
  <h1>Follow Exotic Esports</h1>
  <p>Stay connected with us across all platforms</p>

  <div class="social-links">

    <a href="https://www.youtube.com/channel/UCWu1QnaZ19-GF5eIwMxN7Hw" target="_blank" class="social-card youtube">
      <div class="social-left">
        <img src="youtube.png">
        <div class="social-text">Follow us on YouTube</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a href="https://www.tiktok.com/@team.exotic.esports" target="_blank" class="social-card tiktok">
      <div class="social-left">
        <img src="tiktok.png">
        <div class="social-text">Follow us on TikTok</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a href="https://x.com/ExoticEsportz" target="_blank" class="social-card twitter">
      <div class="social-left">
        <img src="x.png">
        <div class="social-text">Follow us on X</div>
      </div>
      <div class="arrow">→</div>
    </a>

  </div>
</section>

</body>
</html>
