<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
}

/* 🔥 SAME ANIMATED BACKGROUND AS HOME */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, #00cfff22, transparent 60%),
              radial-gradient(circle, #0077ff22, transparent 60%),
              #000814;
  animation: moveBg 15s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(10%, 10%); }
  100% { transform: translate(0,0); }
}

/* 🔥 NAVBAR (IDENTICAL TO HOME) */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;

  position: sticky;
  top: 0;
  z-index: 1000;

  backdrop-filter: blur(12px);
  background: rgba(0, 8, 20, 0.6);

  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.menu-toggle {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #00cfff;
}

/* MOBILE */
@media(max-width: 768px) {
  .menu-toggle { display: block; }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 10px;

    background: rgba(0, 29, 61, 0.85);
    backdrop-filter: blur(12px);

    flex-direction: column;
    width: 200px;
    display: none;
    padding: 10px;

    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,200,255,0.25);
  }

  .nav-links.active {
    display: flex;
  }
}

/* HEADER */
.header {
  text-align: center;
  padding: 80px 20px 40px;
}

.header h1 {
  font-size: 36px;
}

.header p {
  color: #aaa;
}

/* SOCIAL CARDS (MATCH HOME STYLE) */
.social-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.social-container a {
  text-decoration: none;
  color: inherit;
}

.box {
  background: #0b1f2a;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 0 20px rgba(0,200,255,0.4);
}

.box img {
  width: 70px;
  margin-bottom: 15px;
}

.box p {
  font-size: 18px;
}
</style>
</head>
