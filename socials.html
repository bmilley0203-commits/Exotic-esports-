          <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exotic Esports - Socials</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
}

/* NAVBAR */
.navbar {
    background: #0a0a0a;
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
}

/* HEADER TEXT UNDER NAVBAR */
.header {
    text-align: center;
    padding: 25px 15px 10px;
}

.header h1 {
    font-size: 34px;
    font-weight: 900;
    margin: 0;
}

.header p {
    color: #aaa;
    margin-top: 8px;
}

/* SOCIAL BOXES */
.social-container {
    padding: 20px;
}

.social-box {
    background: #111;
    border-radius: 15px;
    margin-bottom: 25px;
    padding: 35px 20px;
    text-align: center;
    border: 2px solid #222;
    transition: 0.2s;
}

.social-box:hover {
    border: 2px solid gold;
    transform: scale(1.03);
}

/* LOGOS */
.social-box img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    margin-bottom: 20px;
}

/* BUTTON */
.social-btn {
    display: inline-block;
    background: #333;
    color: #fff;
    padding: 15px 35px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

.social-btn:hover {
    background: gold;
    color: #000;
}

/* COLOURED SIDE BARS */
.youtube { border-left: 6px solid red; }
.tiktok { border-left: 6px solid #00f2ea; }
.twitter { border-left: 6px solid #1da1f2; }

</style>
</head>

<body>

<div class="navbar">
    Exotic Esports
</div>

<div class="header">
    <h1>FOLLOW EXOTIC ESPORTS</h1>
    <p>Stay connected with us across all platforms</p>
</div>

<div class="social-container">

    <!-- YOUTUBE -->
    <div class="social-box youtube">
        <img src="youtube.png" alt="YouTube">
        <br>
        <a href="https://youtube.com" target="_blank" class="social-btn">
            YOUTUBE
        </a>
    </div>

    <!-- TIKTOK -->
    <div class="social-box tiktok">
        <img src="tiktok.png" alt="TikTok">
        <br>
        <a href="https://tiktok.com" target="_blank" class="social-btn">
            TIKTOK
        </a>
    </div>

    <!-- TWITTER / X -->
    <div class="social-box twitter">
        <img src="x.png" alt="X">
        <br>
        <a href="https://x.com" target="_blank" class="social-btn">
            TWITTER (X)
        </a>
    </div>

</div>

</body>
</html>
