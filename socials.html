<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exotic Esports - Socials</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
}

/* NAVBAR */
.navbar {
    background: #0a0a0a;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar-title {
    font-weight: bold;
    font-size: 18px;
}

/* MENU BUTTON */
.menu-btn {
    background: #111;
    border: none;
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* DROPDOWN */
.dropdown {
    display: none;
    background: #111;
    padding: 10px;
}

.dropdown a {
    display: block;
    color: #fff;
    text-decoration: none;
    padding: 10px;
    border-radius: 6px;
}

.dropdown a:hover {
    background: gold;
    color: #000;
}

/* HEADER */
.header {
    text-align: center;
    padding: 25px 15px 10px;
}

.header h1 {
    font-size: 34px;
    font-weight: 900;
    margin: 0;
}

.header p {
    color: #aaa;
    margin-top: 8px;
}

/* SOCIALS */
.social-container {
    padding: 20px;
}

.social-box {
    background: #111;
    border-radius: 15px;
    margin-bottom: 25px;
    padding: 35px 20px;
    text-align: center;
    border: 2px solid #222;
    transition: 0.2s;
}

.social-box:hover {
    border: 2px solid gold;
    transform: scale(1.03);
}

.social-box img {
    width: 100px;
    height: 100px;
    margin-bottom: 20px;
}

.social-btn {
    display: inline-block;
    background: #333;
    color: #fff;
    padding: 15px 35px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

.social-btn:hover {
    background: gold;
    color: #000;
}

/* COLOUR STRIPS */
.youtube { border-left: 6px solid red; }
.tiktok { border-left: 6px solid #00f2ea; }
.twitter { border-left: 6px solid #1da1f2; }

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="navbar-title">Exotic Esports</div>
    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
</div>

<!-- DROPDOWN MENU -->
<div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="phoenix.html">Phoenix Roster</a>
      <a href="phoenixmatch.html">Phoenix Game Schedule</a>
      <a href="cobras.html">Cobras Roster</a>
      <a href="cobrasmatch.html">Cobra Game Schedule</a>
      <a href="bears.html">Bears Roster</a>
      <a href="bearsmatchs.html">Bears Game Schedule</a>
      <a href="socials.html">Socials</a>
      <a href="about.html">About</a>
    </div>

<!-- HEADER -->
<div class="header">
    <h1>FOLLOW EXOTIC ESPORTS</h1>
    <p>Stay connected with us across all platforms</p>
</div>

<!-- SOCIALS -->
<div class="social-container">

    <div class="social-box youtube">
        <img src="youtube.png">
        <br>
        <a href="https://youtube.com" target="_blank" class="social-btn">YOUTUBE</a>
    </div>

    <div class="social-box tiktok">
        <img src="tiktok.png">
        <br>
        <a href="https://tiktok.com" target="_blank" class="social-btn">TIKTOK</a>
    </div>

    <div class="social-box twitter">
        <img src="x.png">
        <br>
        <a href="https://x.com" target="_blank" class="social-btn">TWITTER (X)</a>
    </div>

</div>

<!-- SCRIPT -->
<script>
function toggleMenu() {
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
