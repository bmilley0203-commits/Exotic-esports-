<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exotic Esports - Socials</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: radial-gradient(circle at center, #0a2a3a 0%, #000 70%);
}

/* NAVBAR */
.navbar {
    position: relative;
    z-index: 1000;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;

    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0, 200, 255, 0.2);
}

/* LOGO */
.logo {
    font-weight: bold;
    font-size: 18px;
    text-shadow: 0 0 12px rgba(0,150,255,0.8);
}

/* MENU BUTTON */
.menu-btn {
    font-size: 24px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* DROPDOWN */
.nav-links {
    display: none;
    flex-direction: column;

    position: absolute;
    top: 60px;
    right: 15px;

    width: 230px;

    background: rgba(5, 25, 40, 0.95);
    backdrop-filter: blur(15px);

    border-radius: 12px;
    overflow: hidden;

    border: 1px solid rgba(0, 200, 255, 0.3);
    box-shadow: 0 0 25px rgba(0, 150, 255, 0.35);

    z-index: 9999;
}

.nav-links a {
    padding: 14px 18px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: 0.25s;
}

.nav-links a:hover {
    background: rgba(0, 150, 255, 0.15);
    color: #00c3ff;
}

.nav-links a:last-child {
    border-bottom: none;
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px 30px;
}

.header h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.header p {
    color: #aaa;
}

/* SOCIAL GRID */
.social-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* MAKE LINKS CLEAN */
.social-container a {
    text-decoration: none;
    color: inherit;
}

/* BOX STYLE */
.box {
    background: rgba(20, 20, 20, 0.6);
    backdrop-filter: blur(10px);
    padding: 40px 20px;
    text-align: center;
    border-radius: 20px;
    transition: 0.3s;

    border: 1px solid rgba(0,200,255,0.15);
    box-shadow: 0 0 25px rgba(0,150,255,0.15);
}

.box:hover {
    transform: translateY(-5px);
    border-color: #00c3ff;
    box-shadow: 0 0 35px rgba(0,150,255,0.45);
}

/* ICONS */
.box img {
    width: 80px;
    margin-bottom: 15px;
}

.box p {
    margin: 0;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Exotic Esports</div>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="phoenix.html">Phoenix Roster</a>
        <a href="phoenixmatch.html">Phoenix Game Schedule</a>
        <a href="cobras.html">Cobras Roster</a>
        <a href="cobrasmatch.html">Cobra Game Schedule</a>
        <a href="bears.html">Bears Roster</a>
        <a href="bearsmatchs.html">Bears Game Schedule</a>
        <a href="socials.html">Socials</a>
        <a href="about.html">About</a>
    </div>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- HEADER -->
<div class="header">
    <h1>FOLLOW EXOTIC ESPORTS</h1>
    <p>Stay connected with us across all platforms</p>
</div>

<!-- SOCIALS -->
<div class="social-container">

    <a href="https://youtube.com/YOURCHANNEL" target="_blank">
        <div class="box">
            <img src="youtube.png">
            <p>YouTube</p>
        </div>
    </a>

    <a href="https://tiktok.com/@YOURNAME" target="_blank">
        <div class="box">
            <img src="tiktok.png">
            <p>TikTok</p>
        </div>
    </a>

    <a href="https://twitter.com/YOURNAME" target="_blank">
        <div class="box">
            <img src="x.png">
            <p>Twitter (X)</p>
        </div>
    </a>

</div>

<script>
function toggleMenu() {
    const nav = document.getElementById("navLinks");
    nav.style.display = (nav.style.display === "flex") ? "none" : "flex";
}
</script>

</body>
</html>
