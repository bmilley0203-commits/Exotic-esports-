    <!DOCTYPE html>
<html lang="en">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0a0a0a;
    padding: 15px;
}

.logo {
    font-weight: bold;
}

/* LINKS */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    color: white;
    text-decoration: none;
}

/* MOBILE */
.menu-btn {
    display: none;
    background: #111;
    color: white;
    border: none;
    padding: 8px;
}

@media (max-width: 768px) {
    .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 55px;
        right: 10px;
        background: #111;
        padding: 10px;
    }

    .menu-btn {
        display: block;
    }
}

/* HEADER */

}

/* BOXES */
.box {
    background: #111;
    margin: 20px;
    padding: 30px;
    text-align: center;
    border-radius: 10px;
}

.box img {

}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Exotic Esports</div>

    <div class="nav-links" id="navLinks">
