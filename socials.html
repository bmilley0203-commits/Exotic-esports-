<!DOCTYPE html>
<html>
<head>
  <title>Socials - Exotic Esports</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background: radial-gradient(circle at top, #111, #000);
      color:white;
    }

    /* HEADER */
    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:#0a0a0a;
      border-bottom:1px solid #222;
    }

    header h2 {
      margin:0;
      color:#fff;
    }

    /* DROPDOWN */
    .dropdown {
      position:relative;
    }

    .dropbtn {
      background:#222;
      color:white;
      padding:10px 14px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .dropdown-content {
      display:none;
      position:absolute;
      right:0;
      background:#111;
      min-width:180px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
    }

    .dropdown-content a {
      display:block;
      padding:12px;
      color:white;
      text-decoration:none;
      transition:0.2s;
    }

    .dropdown-content a:hover {
      background:#222;
    }

    .dropdown:hover .dropdown-content {
      display:block;
    }

    /* PAGE */
    .socials {
      min-height:80vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .socials h1 {
  font-size: 44px;
  font-weight: 900;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
  text-transform: uppercase;
  background: linear-gradient(90deg, #fff, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
    }

    .socials p {
      color:#aaa;
    }

    /* ICON GRID */
    .icons {
      display:flex;
      gap:30px;
      margin-top:40px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .icon {
      width:110px;
      height:110px;
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.25s;
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .icon img {
      width:50px;
      height:50px;
      margin-bottom:8px;
    }

    .icon span {
      font-size:14px;
      color:#ccc;
    }

    /* HOVER EFFECTS */
    .icon:hover {
      transform:scale(1.1);
      background:rgba(255,255,255,0.1);
    }

    .icon.youtube:hover {
      box-shadow:0 0 20px red;
    }

    .icon.tiktok:hover {
      box-shadow:0 0 20px #ff0050;
    }

    .icon.twitter:hover {
      box-shadow:0 0 20px #1da1f2;
    }

  </style>
</head>

<body>

<header>
  <h2>Exotic Esports</h2>

  <div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="phoenix.html">Phoenix Roster</a>
      <a href="phoenixmatch.html">Phoenix Game Schedule</a>
      <a href="cobras.html">Cobras Roster</a>
      <a href="cobrasmatch.html">Cobras Game Schedule</a>
      <a href="bears.html">Bears Roster</a>
      <a href="bearsmatchs.html">Bears Game Schedule</a>
      <a href="socials.html">Socials</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<section class="socials">
  <h1>Follow Exotic Esports</h1>
  <p>Stay connected with us across all platforms</p>

  <div class="icons">

    <a href="https://www.youtube.com/channel/UCWu1QnaZ19-GF5eIwMxN7Hw" target="_blank" class="icon youtube">
      <img src="youtube.png" alt="YouTube">
      <span>YouTube</span>
    </a>

    <a href="https://www.tiktok.com/@team.exotic.esports" target="_blank" class="icon tiktok">
      <img src="tiktok.png" alt="TikTok">
      <span>TikTok</span>
    </a>

    <a href="https://x.com/ExoticEsportz" target="_blank" class="icon twitter">
      <img src="x.png" alt="X">
      <span>Twitter / X</span>
    </a>

  </div>
</section>

</body>
</html>
