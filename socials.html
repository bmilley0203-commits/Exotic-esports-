  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exotic Esports - Socials</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* NAVBAR (MATCHES OTHER PAGES) */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0a0a0a;
    padding: 15px 20px;
    border-bottom: 1px solid #222;
}

.logo {
    font-weight: bold;
    font-size: 18px;
    letter-spacing: 1px;
}

/* LINKS */
.nav-links {
    display: flex;
    gap: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.nav-links a:hover {
    color: gold;
}

/* MOBILE MENU */
.menu-btn {
    display: none;
    background: #111;
    color: white;
    border: none;
    padding: 8px 12px;
    font-size: 18px;
    cursor: pointer;
}

@media (max-width: 768px) {
    .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 60px;
        right: 10px;
        background: #111;
        padding: 15px;
        border-radius: 10px;
        width: 200px;
    }

    .menu-btn {
        display: block;
    }
}

/* HEADER (MATCH HOME STYLE) */
.header {
    text-align: center;
    padding: 40px 20px 20px;
}

.header h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.header p {
    color: #aaa;
}

/* SOCIAL GRID */
.social-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* BOX STYLE (MATCH HOME SECTIONS) */
.box {
    background: #111;
    padding: 30px;
    text-align: center;
    border-radius: 15px;
    transition: 0.3s;
    border: 1px solid #222;
}

.box:hover {
    transform: translateY(-5px);
    border-color: gold;
}

/* ICONS */
.box img {
    width: 70px;
    margin-bottom: 10px;
}

.box p {
    margin: 0;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Exotic Esports</div>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="phoenix.html">Phoenix Roster</a>
        <a href="phoenixmatch.html">Phoenix Game Schedule</a>
        <a href="cobras.html">Cobras Roster</a>
        <a href="cobrasmatch.html">Cobra Game Schedule</a>
        <a href="bears.html">Bears Roster</a>
        <a href="bearsmatchs.html">Bears Game Schedule</a>
        <a href="socials.html">Socials</a>
        <a href="about.html">About</a>
    </div>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- HEADER -->
<div class="header">
    <h1>FOLLOW EXOTIC ESPORTS</h1>
    <p>Stay connected with us across all platforms</p>
</div>

<!-- SOCIALS -->
<div class="social-container">

    <div class="box">
        <img src="youtube.png">
        <p>YouTube</p>
    </div>

    <div class="box">
        <img src="tiktok.png">
        <p>TikTok</p>
    </div>

    <div class="box">
        <img src="x.png">
        <p>Twitter (X)</p>
    </div>

</div>

<script>
function toggleMenu() {
    var nav = document.getElementById("navLinks");
    nav.style.display = (nav.style.display === "flex") ? "none" : "flex";
}
</script>

</body>
</html>
