<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exotic Esports - Socials</title>
<link rel="icon" type="image/png" href="logo4.png">
    

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(to bottom, #000814, #001d3d, #003566);
}

/* ✅ PHOENIX NAVBAR (EXACT MATCH) */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0, 8, 20, 0.6);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo { font-size: 20px; font-weight: bold; }
.menu-icon { font-size: 24px; cursor: pointer; }

/* DROPDOWN (SAME AS PHOENIX) */
.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: #001d3d;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,200,255,0.25);
    z-index: 9999;
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dropdown a:hover {
    background: #003566;
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px 30px;
}

.header h1 {
    font-size: 32px;
}

.header p {
    color: #aaa;
}

/* SOCIAL SECTION (MATCH ROSTER PANELS) */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0, 20, 40, 0.7);
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.15);
}

/* GRID */
.social-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

/* CARD */
.box {
    background: rgba(0, 40, 70, 0.85);
    border-radius: 14px;
    padding: 25px;
    text-align: center;
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px #00d4ff;
}

.box img {
    width: 70px;
    margin-bottom: 10px;
}

.box p {
    font-size: 18px;
}

/* LINK RESET */
a {
    text-decoration: none;
    color: inherit;
}
</style>
</head>

<body>

<!-- ✅ PHOENIX NAVBAR -->
<div class="navbar">
    <div class="logo">Exotic Esports</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="dropdown" id="menu">
    <a href="index.html">Home</a>
    <a href="phoenix.html">Phoenix Roster</a>
    <a href="phoenixmatch.html">Phoenix Schedule</a>
    <a href="cobras.html">Cobras Roster</a>
    <a href="cobrasmatch.html">Cobras Schedule</a>
    <a href="yetis.html">Yetis Roster</a>
    <a href="yetismatchs.html">Yetis Schedule</a>
    <a href="socials.html">Socials</a>
    <a href="about.html">About</a>
</div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>FOLLOW EXOTIC ESPORTS</h1>
    <p>Stay connected with us across all platforms</p>
</div>

<!-- SOCIALS -->
<div class="section">
<div class="social-container">

    <a href="https://youtube.com/YOURCHANNEL" target="_blank">
        <div class="box">
            <img src="youtube.png">
            <p>YouTube</p>
        </div>
    </a>

    <a href="https://www.tiktok.com/@team.exotic.esports?_r=1&_t=ZS-95BLnZfpBhY" target="_blank">
        <div class="box">
            <img src="tiktok.png">
            <p>TikTok</p>
        </div>
    </a>

    <!-- ✅ FIXED MISSING X -->
    <a href="https://x.com/ExoticEsportz?s=20" target="_blank">
        <div class="box">
            <img src="x.png">
            <p>Twitter / X</p>
        </div>
    </a>

</div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
