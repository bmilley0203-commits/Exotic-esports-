<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Matches</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #001a26, #000);
    color: white;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0, 20, 30, 0.6);
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    border-bottom: 1px solid rgba(0,255,255,0.2);
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
}

/* DROPDOWN */
.dropdown {
    position: absolute;
    right: 20px;
    top: 60px;
    background: rgba(0, 20, 40, 0.95);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    width: 220px;
}

.dropdown a {
    display: block;
    padding: 14px;
    color: #bfefff;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.dropdown a:hover {
    background: rgba(0,255,255,0.1);
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 10px 10px;
}

.header h1 {
    font-size: 36px;
    color: #6feaff;
}

/* SECTION TITLES */
.section-title {
    margin: 30px 20px 10px;
    font-size: 22px;
    color: #8befff;
    border-left: 4px solid #00eaff;
    padding-left: 10px;
}

/* MATCH CARD */
.match {
    background: rgba(0, 30, 50, 0.6);
    margin: 15px 20px;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(0,255,255,0.08);
    text-align: center;
}

/* TEAM LAYOUT */
.teams {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* TEAM */
.team {
    width: 40%;
    text-align: center;
}

.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    overflow: visible; /* 🔥 key change */

    box-shadow: 0 0 15px rgba(0,255,255,0.2);
}

/* MAKE LOGO OVERFLOW */
.logo img {
    width: 115%;   /* 🔥 bigger than container */
    height: 115%;
    object-fit: cover;
    border-radius: 50%;
}
}

/* IMAGE FIT FIX */
.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

/* VS / SCORE */
.vs, .score {
    width: 20%;
    font-size: 20px;
    opacity: 0.8;
}

/* DATE */
.date {
    margin-top: 12px;
    opacity: 0.8;
}

/* WIN LOSS */
.win {
    color: #00ff9d;
    text-shadow: 0 0 10px #00ff9d;
}

.loss {
    color: #ff4d6d;
    text-shadow: 0 0 10px #ff4d6d;
}

/* WINNER TEXT */
.winner {
    margin-top: 10px;
    font-weight: bold;
}

/* BUTTON */
.btn {
    margin-top: 12px;
    padding: 10px 20px;
    border-radius: 10px;
    background: #00cfff;
    border: none;
    cursor: pointer;
    color: black;
    font-weight: bold;
}

/* WIN PULSE */
.win-logo {
    animation: winPulse 1.2s infinite alternate;
}

@keyframes winPulse {
    from { box-shadow: 0 0 10px #00ff9d; }
    to { box-shadow: 0 0 25px #00ff9d; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>Exotic Esports</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="dropdown" id="menu">
    <a href="index.html">Home</a>
    <a href="phoenix.html">Phoenix Roster</a>
    <a href="phoenixmatch.html">Phoenix Game Schedule</a>
    <a href="#">Cobras Roster</a>
    <a href="#">Cobras Game Schedule</a>
    <a href="#">Bears Roster</a>
    <a href="#">Bears Game Schedule</a>
    <a href="#">Socials</a>
    <a href="#">About</a>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Phoenix Matches</h1>
</div>

<!-- UPCOMING -->
<div class="section-title">Upcoming Matches</div>

<div class="match">
    <div class="teams">
        <div class="team">
            <div class="logo"><img src="phoenix.png"></div>
            <p>Phoenix</p>
        </div>

        <div class="vs">VS</div>

        <div class="team">
            <div class="logo"><img src="reputation.png"></div>
            <p>OPM Reputation</p>
        </div>
    </div>

    <div class="date">29 March - 8:30 PM</div>
</div>

<!-- RESULTS -->
<div class="section-title">Results</div>

<div class="match">
    <div class="teams">
        <div class="team">
            <div class="logo"><img src="phoenix.png"></div>
            <p>Phoenix</p>
        </div>

        <div class="score loss">0 - 1</div>

        <div class="team">
            <div class="logo win-logo"><img src="zgg.png"></div>
            <p>ZGG Venomous</p>
        </div>
    </div>

    <div class="winner win">Winner: ZGG Venomous (BO1)</div>
    <button class="btn">Watch VOD</button>
</div>

<script>
function toggleMenu() {
    let menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
