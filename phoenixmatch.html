<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Matches - Exotic Esports</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, #00cfff22, transparent 60%),
              radial-gradient(circle, #0077ff22, transparent 60%),
              #000814;
  animation: moveBg 15s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(10%, 10%); }
  100% { transform: translate(0,0); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 80px;
  padding: 0 25px;
  position: sticky;
  top: 0;
  backdrop-filter: blur(14px);
  background: rgba(0, 8, 20, 0.65);
}

/* LIVE BADGE */
.live-badge {
  display: inline-block;
  background: #ff2d2d;
  padding: 5px 10px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 12px;
  animation: livePulse 1.5s infinite;
}

@keyframes livePulse {
  0% { box-shadow: 0 0 5px #ff2d2d; }
  50% { box-shadow: 0 0 20px #ff2d2d; }
  100% { box-shadow: 0 0 5px #ff2d2d; }
}

/* MATCH */
.match {
  background: rgba(0, 20, 40, 0.7);
  margin: 20px auto;
  padding: 20px;
  max-width: 420px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
}

/* LIVE MATCH EFFECT */
.match.live {
  border: 1px solid #ff2d2d;
  box-shadow: 0 0 25px rgba(255,45,45,0.5);
}

/* TEAMS */
.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team { text-align: center; }

/* LOGO */
.team-logo {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #00b4d8;
}

.team-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Exotic Esports</h2>
</div>

<h1 style="text-align:center;">Phoenix Matches</h1>

<div class="match" data-time="2026-03-29T20:30:00" id="match1">

  <div class="teams">
    <div class="team">
      <div class="team-logo"><img src="phoenix.png"></div>
      <p>Phoenix</p>
    </div>

    <div>VS</div>

    <div class="team">
      <div class="team-logo"><img src="reputation.png"></div>
      <p>OPM Reputation</p>
    </div>
  </div>

  <!-- THIS AUTO CHANGES -->
  <p class="match-time">29 March - 8:30 PM</p>

</div>

<script>
function updateLiveMatches() {
  const matches = document.querySelectorAll(".match");

  matches.forEach(match => {
    const matchTime = new Date(match.dataset.time).getTime();
    const now = new Date().getTime();

    const TWO_HOURS = 2 * 60 * 60 * 1000;

    const timeDisplay = match.querySelector(".match-time");

    if (now >= matchTime && now <= matchTime + TWO_HOURS) {
      match.classList.add("live");
      timeDisplay.innerHTML = '<span class="live-badge">🔴 LIVE</span>';
    }
  });
}

updateLiveMatches();

/* optional: keep checking every minute */
setInterval(updateLiveMatches, 60000);
</script>

</body>
</html>
