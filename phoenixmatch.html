<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Matches - Exotic Esports</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, #00cfff22, transparent 60%),
              radial-gradient(circle, #0077ff22, transparent 60%),
              #000814;
  animation: moveBg 15s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(10%, 10%); }
  100% { transform: translate(0,0); }
}

/* 🔥 NAVBAR FIXED (MATCHES ROSTER PAGE) */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  height: 80px;
  padding: 0 25px;

  position: sticky;
  top: 0;
  z-index: 1000;

  backdrop-filter: blur(14px);
  background: rgba(0, 8, 20, 0.65);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.navbar h2 {
  font-size: 26px;
  margin: 0;
}

.menu-toggle {
  font-size: 28px;
  cursor: pointer;
}

.nav-links {
  position: absolute;
  top: 80px;
  right: 10px;
  background: rgba(0, 29, 61, 0.95);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  display: none;
  flex-direction: column;
  width: 200px;
}

.nav-links a {
  padding: 12px;
  color: white;
  text-decoration: none;
}

.nav-links.active {
  display: flex;
}

/* TITLES */
h1, h2 { text-align: center; }

.section {
  margin: 30px 15px;
}

/* MATCH CARD */
.match {
  background: rgba(0, 20, 40, 0.7);
  margin: 20px auto;
  padding: 20px;
  max-width: 420px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,200,255,0.15);
}

/* TEAMS */
.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team {
  text-align: center;
  width: 35%;
}

/* 🔥 LOGO FIXED */
.team-logo {
  width: 75px;
  height: 75px;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  background: radial-gradient(circle, #001d3d, #000814);
  border: 2px solid #00b4d8;

  overflow: hidden;
  position: relative;

  animation: idleGlow 3s ease-in-out infinite;
}

.team-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 10px;
  transform: scale(0.9);

  filter: drop-shadow(0 0 6px rgba(0,229,255,0.6));
}

/* IDLE GLOW */
@keyframes idleGlow {
  0% { box-shadow: 0 0 8px rgba(0,180,216,0.2); }
  50% { box-shadow: 0 0 14px rgba(0,180,216,0.35); }
  100% { box-shadow: 0 0 8px rgba(0,180,216,0.2); }
}

/* WINNER */
@keyframes pulseGlow {
  0% { box-shadow: 0 0 12px #00e5ff, 0 0 25px #00e5ff; }
  50% { box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff; }
  100% { box-shadow: 0 0 12px #00e5ff, 0 0 25px #00e5ff; }
}

@keyframes logoScale {
  0% { transform: scale(0.9); }
  50% { transform: scale(1.05); }
  100% { transform: scale(0.9); }
}

.winner .team-logo {
  border-color: #00e5ff;
  animation: pulseGlow 2s infinite;
}

.winner .team-logo img {
  animation: logoScale 2s infinite;
}

/* LOSER */
.loser .team-logo {
  opacity: 0.35;
  filter: grayscale(70%);
  animation: none;
}

/* MAPS */
.maps {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 8px;
}

.map {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
}

.map.win {
  background: #00e5ff;
  color: black;
}

.map.loss {
  background: #2a2a2a;
  color: #aaa;
}

/* TEXT */
.win {
  color: #00e5ff;
  font-weight: 600;
}

/* VOD */
.vod { display: none; margin-top: 15px; }

.vod iframe {
  width: 100%;
  height: 215px;
  border-radius: 10px;
}

/* BUTTON */
.vod-btn {
  background: #00b4d8;
  color: black;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Exotic Esports</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navMenu">
    <a href="index.html">Home</a>
    <a href="phoenix.html">Phoenix Roster</a>
    <a href="phoenixmatch.html">Phoenix Game Schedule</a>
    <a href="socials.html">Socials</a>
  </div>
</div>

<h1>Phoenix Matches</h1>

<div class="section">
  <h2>Upcoming Matches</h2>

  <div class="match">
    <div class="teams">
      <div class="team">
        <div class="team-logo"><img src="phoenix.png"></div>
        <p>Phoenix</p>
      </div>

      <div>VS</div>

      <div class="team">
        <div class="team-logo"><img src="reputation.png"></div>
        <p>OPM Reputation</p>
      </div>
    </div>

    <p>29 March - 8:30 PM</p>
    <p>Format: BO1</p>

    <div class="maps">
      <div class="map">Kafe</div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Results</h2>

  <div class="match">
    <div class="teams">

      <div class="team loser">
        <div class="team-logo"><img src="phoenix.png"></div>
        <p>Phoenix</p>
      </div>

      <div>
        0 - 1
        <div class="maps">
          <div class="map loss">Clubhouse 0-7</div>
        </div>
      </div>

      <div class="team winner">
        <div class="team-logo"><img src="venomous.png"></div>
        <p>ZGG Venomous</p>
      </div>

    </div>

    <p class="win">Winner: ZGG Venomous (BO1)</p>

    <button class="vod-btn" onclick="toggleVOD('vod1', this)">Watch VOD</button>

    <div id="vod1" class="vod">
      <iframe src="https://www.youtube.com/embed/Jbjy_wgpI-Q" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

function toggleVOD(id, btn) {
  const vod = document.getElementById(id);
  const isHidden = vod.style.display === "none" || vod.style.display === "";

  vod.style.display = isHidden ? "block" : "none";
  btn.innerText = isHidden ? "Hide VOD" : "Watch VOD";
}
</script>

</body>
</html>
