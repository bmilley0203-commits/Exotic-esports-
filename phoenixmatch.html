<style>
body {

/* BACKGROUND GLOW */
body::before {
content: "";
position: fixed;
inset: 0;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.18), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,0,0,0.12), transparent 45%),
radial-gradient(circle at 50% 80%, rgba(255,0,0,0.10), transparent 50%);

/* NAVBAR */

-webkit-text-fill-color: transparent;
animation: shine 4s linear infinite;
}

/* MENU */
.menu-btn {

cursor: pointer;
color: #ff1a1a;
}

/* DROPDOWN */
.dropdown {
position: absolute;

right: 15px;
background: rgba(20, 0, 0, 0.95);
border: 1px solid rgba(255,0,0,0.3);
border-radius: 12px;
display: none;
flex-direction: column;
width: 220px;
box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.dropdown a {
padding: 14px;
text-decoration: none;
color: #ff4d4d;
}

.dropdown a:hover {
background: rgba(255,0,0,0.2);
color: white;
}

/* HEADER */
.header {
text-align: center;
margin: 30px 0 10px;
}

.header h1 {
background: linear-gradient(90deg,#ff1a1a,#ffffff,#ff1a1a);
background-size: 300% 100%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: shine 4s linear infinite;
}

/* SECTION TITLE */
.section-title {
margin: 25px 20px 10px;
font-size: 20px;
background: linear-gradient(90deg,#ff1a1a,#ffffff,#ff1a1a);
background-size: 300% 100%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
border-left: 4px solid #ff1a1a;
padding-left: 10px;
animation: shine 4s linear infinite;

/* MATCH CARD */
.match {
background: rgba(25, 0, 0, 0.75);

padding: 20px;

transition: 0.3s;
}

.match:hover {
transform: translateY(-4px);
box-shadow: 0 0 30px rgba(255,0,0,0.4);
}

/* TEAMS */
.teams {
display: flex;
justify-content: space-between;
align-items: center;
}

.team {
width: 40%;
}

/* LOGO */
.logo {
width: 90px;
height: 90px;
border-radius: 50%;
overflow: hidden;
margin: auto;
background: rgba(0,0,0,0.6);
box-shadow: 0 0 15px rgba(255,0,0,0.4);
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

.logo img {
position: absolute;
width: 115%;
height: 115%;
object-fit: cover;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
}

/* SCORE */
.score, .vs {
width: 20%;
font-size: 20px;
}

.vs {
color: #ff1a1a;
font-weight: bold;
}

/* MAPS */
.map-series {
margin-top: 15px;
margin-bottom: 5px;
display: flex;
justify-content: center;
flex-wrap: wrap;
gap: 8px;
}

.map-box {
padding: 6px 10px;
border-radius: 8px;
font-size: 12px;
min-width: 70px;
background: rgba(255,255,255,0.05);
}

.map-loss {
background: rgba(255,77,109,0.15);
border: 1px solid #ff4d6d;
color: #ff4d6d;
}

.map-win {
background: rgba(0,255,157,0.15);
border: 1px solid #00ff9d;
color: #00ff9d;
}

/* MVP */
.mvp {
margin-top: 14px;
font-size: 15px;
opacity: 0.9;
}

/* BUTTON */
.btn {
margin-top: 12px;
padding: 10px 20px;
border-radius: 10px;
border: 2px solid #ff1a1a;
background: transparent;
color: #ff1a1a;
cursor: pointer;
font-weight: bold;
box-shadow: 0 0 10px rgba(255,0,0,0.4);
transition: 0.3s;
animation: pulse 2.5s infinite;
}

.btn:hover {
background: #ff1a1a;
color: black;
box-shadow: 0 0 25px #ff1a1a;
transform: scale(1.05);
}

/* VOD */
.vod-container {
max-height: 0;
overflow: hidden;
transition: 0.4s;
}

.vod-container.active {
max-height: 300px;
}

.vod-container iframe {
width: 100%;
height: 220px;
border-radius: 12px;
border: none;
}

/* ANIMATIONS */
@keyframes pulse {
0% { box-shadow: 0 0 8px rgba(255,0,0,0.3); }
50% { box-shadow: 0 0 25px rgba(255,0,0,0.7); }
100% { box-shadow: 0 0 8px rgba(255,0,0,0.3); }
}

@keyframes shine {
0% { background-position: 0% 50%; }
100% { background-position: 300% 50%; }
}
</style>

<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function toggleVOD(button, link){
    const container = button.nextElementSibling;
    const iframe = container.querySelector("iframe");

    if(container.classList.contains("active")){
        container.classList.remove("active");
        iframe.src = "";
    } else {
        document.querySelectorAll(".vod-container").forEach(v=>{
            v.classList.remove("active");
            v.querySelector("iframe").src = "";
        });

        container.classList.add("active");

        if(link.startsWith("twitch:")){
            const id = link.split(":")[1];
            iframe.src = `https://player.twitch.tv/?video=${id}&parent=exoticesports.vercel.app`;
        } else {
            iframe.src = link;
        }
    }
}

function showMore(){
    document.querySelectorAll(".match").forEach(m=>m.classList.remove("hidden"));
}

function showLess(){
    document.querySelectorAll(".match").forEach((m,i)=>{
        if(i>=2) m.classList.add("hidden");
    });
}

function sortMatches(){
    const container = document.getElementById("results");
    const matches = [...container.querySelectorAll(".match")];
    matches.sort((a,b)=>new Date(b.dataset.date)-new Date(a.dataset.date));
    matches.forEach(m=>container.appendChild(m));
}

window.addEventListener("load",()=>{
    sortMatches();
    showLess();
});
</script>
