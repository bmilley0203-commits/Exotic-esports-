<!DOCTYPE html>
<html>
<head>
  <title>Cobra(pc) Roster</title>
  <style>
    body { background:#111; color:white; font-family:Arial; margin:0; }
    h1, h2 { text-align:center; }

    .section { margin: 30px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background:#222;
      padding:15px;
      text-align:center;
      border:2px solid #222;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover { transform: scale(1.05); }

    .pfp {
      width:80px;
      height:80px;
      border-radius:50%;
      background:#444;
      margin: 0 auto 10px;
      background-size:cover;
      background-position:center;
    }
/* Modal */
    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#222;
      padding:20px;
      border:2px solid #222;
      text-align:center;
      max-width:300px;
    }

    .close { cursor:pointer; color:red; float:right; }
     </style>
</head>

<body>

<h1>Cobra PC Roster</h1>

<div class="section">
  <h2>Coaches</h2>
  <div class="grid">
    <div class="card" onclick="openModal('coach1')">
      <div class="pfp" style="background-image:url('coach.png')"></div>
      <p>Thekidrambo</p>
      <p>Coach</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Starters</h2>
  <div class="grid">

    <!-- 5 STARTERS -->
    <div class="card" onclick="openModal('p1')"><div class="pfp"></div><p>Shadow</p><p>Role</p></div>
    <div class="card" onclick="openModal('p2')"><div class="pfp"></div><p>P2</p><p>Role</p></div>
    <div class="card" onclick="openModal('p3')"><div class="pfp"></div><p>p3</p><p>Role</p></div>
    <div class="card" onclick="openModal('p4')"><div class="pfp"></div><p>p4</p><p>Role</p></div>
    <div class="card" onclick="openModal('p5')"><div class="pfp"></div><p>p5</p><p>Role</p></div>

  </div>
</div>

<div class="section">
  <h2>Subs</h2>
  <div class="grid">

    <!-- 5 SUBS -->
    <div class="card" onclick="openModal('s1')"><div class="pfp"></div><p>s1</p><p>Role</p></div>
    <div class="card" onclick="openModal('s2')"><div class="pfp"></div><p>s2</p><p>Role</p></div>
    <div class="card" onclick="openModal('s3')"><div class="pfp"></div><p>s3</p><p>Role</p></div>
    <div class="card" onclick="openModal('s4')"><div class="pfp"></div><p>s4</p><p>Role</p></div>
     <div class="card" onclick="openModal('s5')"><div class="pfp"></div><p>s5</p><p>Role</p></div>

  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close" onclick="closeModal()">X</span>
    <h2 id="modalName">Player</h2>
    <p id="modalRole">Role</p>
    <p id="modalBio">Add bio here</p>
  </div>
</div>

<script>
function openModal(id) {
  document.getElementById('modal').style.display = 'flex';
   // You can customise each player here
  const data = {
    coach1: {name:'Thekidrambo', role:'Coach', bio:'Coach bio'},
    p1: {name:'p1', role:'Role', bio:'Bio'},
    p2: {name:'p2', role:'Role', bio:'Bio'},
    p3: {name:'p3', role:'Role', bio:'Bio'},
    p4: {name:'p4', role:'Role', bio:'Bio'},
    p5: {name:'p5', role:'Role', bio:'Bio'},
    s1: {name:'s1', role:'Role', bio:'Bio'},
    s2: {name:'s2', role:'Role', bio:'Bio'},
    s3: {name:'s3', role:'role', bio:'Bio'},
    s4: {name:'s4', role:'Role', bio:'Bio'},
    s5: {name:'s5', role:'Role', bio:'Bio'}
  };

  document.getElementById('modalName').innerText = data[id].name;
  document.getElementById('modalRole').innerText = data[id].role;
  document.getElementById('modalBio').innerText = data[id].bio;
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
