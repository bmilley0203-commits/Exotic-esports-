<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobras Roster</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(to bottom, #000814, #001d3d, #003566);
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0, 8, 20, 0.6);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo { font-size: 20px; font-weight: bold; }
.menu-icon { font-size: 24px; cursor: pointer; }

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: #001d3d;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: white;
}
.dropdown a:hover { background: #003566; }

/* TITLE */
.title {
    text-align: center;
    color: #4cc9f0;
    margin: 30px 0 10px;
}

/* SECTION */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0, 20, 40, 0.7);
}

/* ROW */
.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding: 10px 2px;
}

/* CENTER */
.center {
    display: flex;
    justify-content: center;
}

/* CARD */
.card {
    min-width: 120px;
    background: rgba(0, 40, 70, 0.85);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    flex-shrink: 0;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 18px #00d4ff;
}

/* 🔥 PFP */
.card img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: 0 auto 10px;

    padding: 3px;
    background: radial-gradient(circle, #00d4ff, #0077ff);

    box-shadow:
        0 0 10px #00d4ff,
        0 0 20px rgba(0, 212, 255, 0.6);
}

.card:hover img {
    box-shadow:
        0 0 15px #00d4ff,
        0 0 30px #0077ff;
}

.name { font-size: 14px; font-weight: bold; }
.role { font-size: 11px; color: #aaa; }

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.overlay-content {
    background: #001d3d;
    padding: 25px;
    border-radius: 16px;
    width: 85%;
    max-width: 320px;
    text-align: center;
}

.overlay img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    padding: 4px;
    background: radial-gradient(circle, #00d4ff, #0077ff);
    object-fit: cover;
}

#overlayBio {
    color: #ccc;
    font-size: 14px;
    margin-top: 8px;
}

.close-btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: #00b4d8;
    color: black;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Exotic Esports</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="dropdown" id="menu">
        <a href="index.html">Home</a>
        <a href="phoenix.html">Phoenix</a>
        <a href="cobras.html">Cobras</a>
        <a href="bears.html">Bears</a>
    </div>
</div>

<h1 class="title">Cobras PC Roster</h1>

<!-- COACH -->
<div class="section">
<h2>Coach</h2>
<div class="center">
<div class="card" onclick="openPlayer('Thekidrambo','Coach','Leads strategy and team development','coach.png')">
<img src="coach.png">
<div class="name">Thekidrambo</div>
<div class="role">Coach</div>
</div>
</div>
</div>

<!-- STARTERS -->
<div class="section">
<h2>Starters</h2>
<div class="row">

<div class="card" onclick="openPlayer('Shadow','Entry','Aggressive entry fragger','placeholder.png')">
<img src="placeholder.png">
<div class="name">Shadow</div>
<div class="role">Entry</div>
</div>

<div class="card" onclick="openPlayer('Danny','Flex','Adaptable player','placeholder.png')">
<img src="placeholder.png">
<div class="name">Danny</div>
<div class="role">Flex</div>
</div>

<div class="card" onclick="openPlayer('SuperNicer','Support','Utility and support specialist','placeholder.png')">
<img src="placeholder.png">
<div class="name">SuperNicer</div>
<div class="role">Support</div>
</div>

<div class="card" onclick="openPlayer('Grug','IGL','In-game leader','placeholder.png')">
<img src="placeholder.png">
<div class="name">Grug</div>
<div class="role">IGL</div>
</div>

<div class="card" onclick="openPlayer('Blox','Flex','Consistent and reliable','placeholder.png')">
<img src="placeholder.png">
<div class="name">Blox</div>
<div class="role">Flex</div>
</div>

</div>
</div>

<!-- SUBS -->
<div class="section">
<h2>Subs</h2>
<div class="row">

<div class="card" onclick="openPlayer('S1','Sub','Ready to step in','placeholder.png')">
<img src="placeholder.png">
<div class="name">S1</div>
<div class="role">Sub</div>
</div>

<div class="card" onclick="openPlayer('S2','Sub','Flexible substitute','placeholder.png')">
<img src="placeholder.png">
<div class="name">S2</div>
<div class="role">Sub</div>
</div>

</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="playerOverlay">
<div class="overlay-content">
<img id="overlayImg">
<h2 id="overlayName"></h2>
<p id="overlayBio"></p>
<button class="close-btn" onclick="closeOverlay()">Close</button>
</div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function openPlayer(name, role, bio, img) {
    document.getElementById("overlayName").innerText = name;
    document.getElementById("overlayBio").innerText = role + " • " + bio;
    document.getElementById("overlayImg").src = img;
    document.getElementById("playerOverlay").style.display = "flex";
}

function closeOverlay() {
    document.getElementById("playerOverlay").style.display = "none";
}
</script>

</body>
</html>
