<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobras Roster</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(to bottom, #000814, #001d3d, #003566);
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0, 8, 20, 0.6);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo { font-size: 20px; font-weight: bold; }
.menu-icon { font-size: 24px; cursor: pointer; }

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: #001d3d;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,200,255,0.25);
    z-index: 9999;
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dropdown a:hover {
    background: #003566;
}

/* TITLE */
.title {
    text-align: center;
    color: #4cc9f0;
    margin: 30px 0 10px;
}

/* SECTION */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0, 20, 40, 0.7);
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.15);
}

.section h2 {
    color: #90e0ef;
}

/* ROW SCROLL */
.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.row::-webkit-scrollbar {
    height: 6px;
}
.row::-webkit-scrollbar-thumb {
    background: #00b4d8;
    border-radius: 10px;
}

/* CARD */
.card {
    min-width: 120px;
    background: rgba(0, 40, 70, 0.85);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px #00d4ff;
}

/* PFP */
.pfp {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 8px;

    border: 2px solid #00b4d8;
    box-shadow: 0 0 10px rgba(0,180,216,0.6);

    position: relative;
}

.pfp img {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: translate(-50%, -50%) scale(1.5);
}

/* TEXT */
.name { font-size: 14px; font-weight: bold; }
.role { font-size: 11px; color: #aaa; }

/* CENTER */
.center {
    display: flex;
    justify-content: center;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.overlay-content {
    background: #001d3d;
    padding: 25px;
    border-radius: 16px;
    width: 85%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,200,255,0.3);
}

.overlay img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid #00b4d8;
    margin-bottom: 10px;

    object-fit: cover;

    /* KEY FIX */
    transform: scale(1.5);
    transform-origin: center;
}

.close-btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: #00b4d8;
    color: black;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Exotic Esports</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="dropdown" id="menu">
        <a href="index.html">Home</a>
        <a href="phoenix.html">Phoenix Roster</a>
        <a href="phoenixmatch.html">Phoenix Game Schedule</a>
        <a href="cobras.html">Cobras Roster</a>
        <a href="cobrasmatch.html">Cobra Game Schedule</a>
        <a href="bears.html">Bears Roster</a>
        <a href="bearsmatchs.html">Bears Game Schedule</a>
        <a href="socials.html">Socials</a>
        <a href="about.html">About</a>
    </div>
</div>

<h1 class="title">Cobras PC Roster</h1>

<!-- COACH -->
<div class="section">
    <h2>Coach</h2>
    <div class="center">
        <div class="card" onclick="openPlayer('DxrkWars','Coach','dxrk.png','Leads strategy and team development')">
            <div class="pfp"><img src="dxrk.png"></div>
            <div class="name">DxrkWars</div>
            <div class="role">Coach</div>
        </div>
    </div>
</div>

<!-- STARTERS -->
<div class="section">
<h2>Starters</h2>
<div class="row">

<div class="card" onclick="openPlayer('Danny','IGL','danny.png','In-game leader and shot caller')">
<div class="pfp"><img src="danny.png"></div><div class="name">Danny</div><div class="role">IGL</div></div>

<div class="card" onclick="openPlayer('Shadow','Entry','Shadow.png','Aggressive entry fragger')">
<div class="pfp"><img src="Shadow.png"></div><div class="name">Shadow</div><div class="role">Entry</div></div>

<div class="card" onclick="openPlayer('Grug','Flex','grug.png','Flexible role player')">
<div class="pfp"><img src="grug.png"></div><div class="name">Grug</div><div class="role">Flex</div></div>

<div class="card" onclick="openPlayer('Blox','Flex','blox.png','Consistent flex player')">
<div class="pfp"><img src="blox.png"></div><div class="name">Blox</div><div class="role">Flex</div></div>

<div class="card" onclick="openPlayer('SuperNicer','Support','super.png','Support and utility specialist')">
<div class="pfp"><img src="super.png"></div><div class="name">SuperNicer</div><div class="role">Support</div></div>

</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <div class="overlay-content">
        <img id="overlay-img" src="">
        <h2 id="overlay-name"></h2>
        <p id="overlay-role"></p>
        <p id="overlay-bio"></p>
        <button class="close-btn" onclick="closeOverlay()">Close</button>
    </div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function openPlayer(name, role, img, bio) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("overlay-name").innerText = name;
    document.getElementById("overlay-role").innerText = role;
    document.getElementById("overlay-img").src = img;
    document.getElementById("overlay-bio").innerText = bio;
}

function closeOverlay() {
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
