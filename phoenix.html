<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Roster</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(to bottom, #000814, #001d3d, #003566);
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0, 8, 20, 0.6);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.menu-icon {
    font-size: 24px;
    cursor: pointer;
}

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: #001d3d;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,200,255,0.25);
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dropdown a:hover {
    background: #003566;
}

/* TITLE */
.title {
    text-align: center;
    color: #4cc9f0;
    margin: 30px 0 10px;
}

/* SECTION */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0, 20, 40, 0.7);
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.15);
}

.section h2 {
    color: #90e0ef;
}

/* ROW */
.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.row::-webkit-scrollbar {
    height: 6px;
}
.row::-webkit-scrollbar-thumb {
    background: #00b4d8;
    border-radius: 10px;
}

/* CARD */
.card {
    min-width: 120px;
    background: rgba(0, 40, 70, 0.85);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #00d4ff;
}

/* 🔥 NEW PFP SYSTEM */
.pfp {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #00b4d8;

    position: relative;
    overflow: hidden;

    box-shadow: 0 0 10px #0077b6, 0 0 20px rgba(0,180,216,0.5);
}

/* 🔥 KEY FIX */
.pfp img {
    position: absolute;
    top: 50%;
    left: 50%;

    width: 100%;
    height: 100%;

    object-fit: cover;

    transform: translate(-50%, -50%) scale(1.15);
}

.card:hover .pfp {
    box-shadow: 0 0 15px #00b4d8, 0 0 30px #0077b6;
}



/* TEXT */
.name {
    font-size: 14px;
    font-weight: bold;
    margin-top: 8px;
}

.role {
    font-size: 11px;
    color: #aaa;
}

/* CENTER */
.center {
    display: flex;
    justify-content: center;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.overlay-content {
    background: #001d3d;
    padding: 25px;
    border-radius: 16px;
    width: 85%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,200,255,0.3);
}

.overlay img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid #00b4d8;
    margin-bottom: 10px;
}

.close-btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: #00b4d8;
    color: black;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Exotic Esports</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="dropdown" id="menu">
        <a href="index.html">Home</a>
        <a href="phoenix.html">Phoenix Roster</a>
        <a href="phoenixmatch.html">Phoenix Game Schedule</a>
        <a href="cobras.html">Cobras Roster</a>
        <a href="cobrasmatch.html">Cobra Game Schedule</a>
        <a href="bears.html">Bears Roster</a>
        <a href="bearsmatchs.html">Bears Game Schedule</a>
        <a href="socials.html">Socials</a>
        <a href="about.html">About</a>
    </div>
</div>

<h1 class="title">Phoenix Console Roster</h1>

<!-- COACH -->
<div class="section">
    <h2>Coach</h2>
    <div class="center">
        <div class="card" onclick="openPlayer('Thekidrambo','Team coach','coach.png')">
            <div class="pfp"><img src="coach.png"></div>
            <div class="name">Thekidrambo</div>
            <div class="role">Coach</div>
        </div>
    </div>
</div>

<!-- STARTERS -->
<div class="section">
    <h2>Starters</h2>
    <div class="row">

        <div class="card" onclick="openPlayer('Spadeonics','IGL','soadeonics.png')">
            <div class="pfp"><img src="soadeonics.png"></div>
            <div class="name">Spadeonics</div>
            <div class="role">IGL</div>
        </div>

        <div class="card" onclick="openPlayer('Xef','Entry','xef.png')">
            <div class="pfp"><img src="xef.png"></div>
            <div class="name">Xef</div>
            <div class="role">Entry</div>
        </div>

        <div class="card" onclick="openPlayer('Dalton','Entry','dalton.png')">
            <div class="pfp"><img src="dalton.png"></div>
            <div class="name">Dalton</div>
            <div class="role">Entry</div>
        </div>

    </div>
</div>

<!-- SUBS -->
<div class="section">
    <h2>Subs</h2>
    <div class="row">

        <div class="card" onclick="openPlayer('Nicheorange','IGL/Entry','placeholder.png')">
            <div class="pfp"><img src="placeholder.png"></div>
            <div class="name">Nicheorange</div>
            <div class="role">IGL/Entry</div>
        </div>

        <div class="card" onclick="openPlayer('Vursed','Entry','vursed.png')">
            <div class="pfp"><img src="vursed.png"></div>
            <div class="name">Vursed</div>
            <div class="role">Entry</div>
        </div>

    </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="playerOverlay">
    <div class="overlay-content">
        <img id="overlayImg" src="">
        <h2 id="overlayName"></h2>
        <p id="overlayBio"></p>
        <button class="close-btn" onclick="closeOverlay()">Close</button>
    </div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function openPlayer(name, bio, img) {
    document.getElementById("overlayName").innerText = name;
    document.getElementById("overlayBio").innerText = bio;
    document.getElementById("overlayImg").src = img;
    document.getElementById("playerOverlay").style.display = "flex";
}

function closeOverlay() {
    document.getElementById("playerOverlay").style.display = "none";
}
</script>

</body>
</html>
