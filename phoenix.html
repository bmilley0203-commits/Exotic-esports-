<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Roster</title>
<link rel="icon" type="image/png" href="logo4.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    color: white;
    background: radial-gradient(circle at top, #0a0f14, #05070a);
    overflow-x: hidden;
}

/* NEON BACKGROUND (MATCH HOME PAGE) */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,234,255,0.14), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(0,180,255,0.10), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(0,234,255,0.08), transparent 50%);
    filter: blur(22px);
    animation: floatBg 12s ease-in-out infinite;
    z-index: -1;
}

@keyframes floatBg {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(2%, -2%); }
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(14px);
    background: rgba(8,12,18,0.7);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,234,255,0.25);
}

.logo {
    font-weight: bold;
    color: #00eaff;
}

.menu-icon {
    font-size: 24px;
    cursor: pointer;
    color: #00eaff;
}

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: rgba(0,20,40,0.95);
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,234,255,0.25);
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: #00eaff;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dropdown a:hover {
    background: rgba(0,234,255,0.1);
}

/* TITLE */
.title {
    text-align: center;
    margin: 30px 0 10px;
    color: #00eaff;
    text-shadow: 0 0 15px rgba(0,234,255,0.5);
}

/* SECTION */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0, 20, 40, 0.65);
    border: 1px solid rgba(0,234,255,0.15);
}

/* ROW */
.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* CARD */
.card {
    min-width: 120px;
    background: linear-gradient(135deg, rgba(0,234,255,0.12), rgba(0,0,0,0.85));
    border: 1px solid rgba(0,234,255,0.25);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(0,234,255,0.35), transparent);
    transform: skewX(-20deg);
    animation: shimmer 3.5s linear infinite;
}

@keyframes shimmer {
    0% { left: -120%; }
    100% { left: 120%; }
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(0,234,255,0.35);
}

/* PFP */
.pfp {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin: auto;
    overflow: hidden;
    border: 2px solid #00b4d8;
}

.pfp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXT */
.name { font-size: 14px; font-weight: bold; }
.role { font-size: 11px; color: #aaa; }

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.overlay-content {
    background: #001d3d;
    padding: 25px;
    border-radius: 16px;
    width: 85%;
    max-width: 320px;
    text-align: center;
}

.close-btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: #00b4d8;
    color: black;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Exotic Esports</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="dropdown" id="menu">
        <a href="index.html">Home</a>
        <a href="phoenix.html">Phoenix Roster</a>
        <a href="phoenixmatch.html">Phoenix Schedule</a>
        <a href="cobras.html">Cobras</a>
        <a href="yetis.html">Yetis</a>
        <a href="socials.html">Socials</a>
        <a href="about.html">About</a>
    </div>
</div>

<h1 class="title">Phoenix Console Roster</h1>

<!-- COACH -->
<div class="section">
<h2>Coach</h2>
<div class="row">
<div class="card" onclick="openPlayer('Thekidrambo','Coach','coach.png','Experienced coach leading Phoenix.')">
<div class="pfp"><img src="coach.png"></div>
<div class="name">Thekidrambo</div>
<div class="role">Coach</div>
</div>
</div>
</div>

<!-- STARTERS -->
<div class="section">
<h2>Starters</h2>
<div class="row">

<div class="card" onclick="openPlayer('Kjrsd','IGL/Entry','kj.png','Smart IGL and aggressive entry.')">
<div class="pfp"><img src="kj.png"></div><div class="name">Kjrsd</div><div class="role">IGL/Entry</div></div>

<div class="card" onclick="openPlayer('Dalton','Entry','dalton.png','Fast mechanical player.')">
<div class="pfp"><img src="dalton.png"></div><div class="name">Dalton</div><div class="role">Entry</div></div>

<div class="card" onclick="openPlayer('Chubbs','Flex','chubbs.png','Clutch flex player.')">
<div class="pfp"><img src="chubbs.png"></div><div class="name">Chubbs</div><div class="role">Flex</div></div>

<div class="card" onclick="openPlayer('Golden','Flex','golden.png','Reliable flex player.')">
<div class="pfp"><img src="golden.png"></div><div class="name">Golden</div><div class="role">Flex</div></div>

<div class="card" onclick="openPlayer('Spadeonics','Support','soadeonics.png','Strong support player.')">
<div class="pfp"><img src="soadeonics.png"></div><div class="name">Spadeonics</div><div class="role">Support</div></div>

</div>
</div>

<!-- SUBS -->
<div class="section">
<h2>Subs</h2>
<div class="row">

<div class="card" onclick="openPlayer('Nicheorange','Entry','orange.png','Versatile sub.')">
<div class="pfp"><img src="orange.png"></div><div class="name">Nicheorange</div><div class="role">Entry</div></div>

<div class="card" onclick="openPlayer('Vursed','Entry','vursed.png','High energy sub.')">
<div class="pfp"><img src="vursed.png"></div><div class="name">Vursed</div><div class="role">Entry</div></div>

<div class="card" onclick="openPlayer('BamBaby','Entry','bam.png','Aggressive sub.')">
<div class="pfp"><img src="bam.png"></div><div class="name">BamBaby</div><div class="role">Entry</div></div>

<div class="card" onclick="openPlayer('Bonezy','Flex','bone.png','Flexible sub.')">
<div class="pfp"><img src="bone.png"></div><div class="name">Bonezy</div><div class="role">Flex</div></div>

<div class="card" onclick="openPlayer('Fax','Support','Fax.png','Support sub.')">
<div class="pfp"><img src="Fax.png"></div><div class="name">Fax</div><div class="role">Support</div></div>

</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
<div class="overlay-content">
    <h2 id="overlayName"></h2>
    <p id="overlayRole"></p>
    <p id="overlayBio"></p>
    <button class="close-btn" onclick="closePlayer()">Close</button>
</div>
</div>

<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function openPlayer(name, role, img, bio){
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("overlayName").innerText = name;
    document.getElementById("overlayRole").innerText = role;
    document.getElementById("overlayBio").innerText = bio;
}

function closePlayer(){
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
