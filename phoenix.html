<style>
:root {
    --pfp-size: 60px;
    --pfp-scale: 1.0;
    --overlay-size: 80px;
    --overlay-img-scale: 1.0;
}

/* GENERAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
    padding-bottom: 120px;

    background: radial-gradient(circle at top, #140000, #050000);
}

body::before {
    content: "";
    position: fixed;
    inset: 0;

    background:
        radial-gradient(circle at 20% 20%, rgba(255,0,0,0.18), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,0,0,0.12), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255,0,0,0.10), transparent 50%);

    filter: blur(22px);
    animation: floatBg 12s ease-in-out infinite;

    z-index: -1;
}

@keyframes floatBg {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(2%, -2%); }
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 18px 20px;

    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    background: rgba(20, 0, 0, 0.85);

    border-bottom: 1px solid rgba(255, 0, 0, 0.4);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
}

.logo {
    font-size: 20px;
    font-weight: bold;

    background: linear-gradient(90deg,#ff1a1a,#ffffff,#ff1a1a);
    background-size: 300% 100%;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 4s linear infinite;
}

.menu-icon {
    font-size: 24px;
    cursor: pointer;
    color: #ff1a1a;
}

.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;

    display: none;
    flex-direction: column;

    width: 220px;

    background: rgba(20, 0, 0, 0.95);
    border: 1px solid rgba(255,0,0,0.3);

    border-radius: 12px;
    overflow: hidden;

    box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: #ff4d4d;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dropdown a:hover {
    background: rgba(255, 0, 0, 0.2);
    color: white;
}

.title {
    text-align: center;
    margin: 30px 0 10px;

    background: linear-gradient(90deg,#ff1a1a,#ffffff,#ff1a1a);
    background-size: 300% 100%;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 4s linear infinite;
}

.section {
    margin: 20px 12px;
    padding: 18px;

    border-radius: 18px;
    background: rgba(20, 0, 0, 0.7);

    box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
}

.section h2 {
    text-align: center;

    background: linear-gradient(90deg,#ff1a1a,#ffffff,#ff1a1a);
    background-size: 300% 100%;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 4s linear infinite;
}

.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.row::-webkit-scrollbar { height: 6px; }
.row::-webkit-scrollbar-thumb {
    background: #ff1a1a;
    border-radius: 10px;
}

.card {
    position: relative;
    overflow: hidden;

    min-width: 120px;
    background: rgba(25, 0, 0, 0.85);

    border-radius: 14px;
    padding: 12px;

    text-align: center;
    flex-shrink: 0;

    transition: 0.3s;
    cursor: pointer;

    border: 1px solid rgba(255,0,0,0.2);
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,0,0,0.35),
        transparent
    );

    transform: skewX(-20deg);
    animation: shimmer 3.8s linear infinite;
}

@keyframes shimmer {
    0% { left: -120%; }
    100% { left: 120%; }
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #ff0000;
}

.center {
    display: flex;
    justify-content: center;
}

.pfp {
    width: var(--pfp-size);
    height: var(--pfp-size);

    border-radius: 50%;
    overflow: hidden;

    margin: 0 auto 8px;

    border: 2px solid #ff1a1a;
    box-shadow: 0 0 12px rgba(255,0,0,0.8);
}

.pfp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(var(--pfp-scale));
}

.name { font-size: 14px; font-weight: bold; }
.role { font-size: 11px; color: #aaa; }

@keyframes shine {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}
</style>
</head>
