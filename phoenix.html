body {
  margin: 0;

/* ===== NAVBAR (MATCH HOME) ===== */
.navbar {
  display: flex;
  justify-content: space-between;

.navbar h1 { font-size: 20px; }

.dropdown { position: relative; }

.dropbtn {
  background: none;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: #062f40;
  min-width: 220px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.dropdown-content a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
}

.dropdown-content a:hover { background: #0a4b63; }
.dropdown:hover .dropdown-content { display: block; }

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 40px 20px 20px;
}

.header h2 {
  font-size: 34px;
  background: linear-gradient(90deg, #00e0ff, #6be6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.section-title {
  padding: 10px 20px;
  font-size: 22px;
  opacity: 0.9;
}

/* ===== GRID ===== */
.roster {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 18px;
  padding: 10px 20px 30px;
}

/* ===== PLAYER CARD ===== */
.player-card {
  background: rgba(6, 47, 64, 0.8);
  border-radius: 18px;
  padding: 18px 12px;
  text-align: center;
  border: 1px solid rgba(0,255,255,0.15);
  transition: all 0.25s ease;
  backdrop-filter: blur(6px);
}

.player-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px rgba(0,255,255,0.25);
}

.player-card img {
  width: 85px;
  height: 85px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 2px solid rgba(255,255,255,0.2);
}

.player-card h3 {
  font-size: 16px;
  margin: 5px 0;
}

.role {
  font-size: 13px;
  opacity: 0.7;
}

.kd {
  font-size: 12px;
  opacity: 0.5;
}

/* ROLE COLORS (subtle, not harsh) */
.igl { border-color: rgba(255, 200, 0, 0.6); }
.entry { border-color: rgba(255, 70, 70, 0.6); }
.flex { border-color: rgba(0, 200, 255, 0.6); }
.support { border-color: rgba(0, 255, 150, 0.6); }
.sub { border-color: rgba(200,200,200,0.4); }
.coach { border-color: rgba(180,100,255,0.5); }
