<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Roster</title>
<link rel="icon" type="image/png" href="logo4.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    color: white;
    overflow-x: hidden;
    background: radial-gradient(circle at top, #0a0f14, #05070a);
}

/* ================= PARTICLES ================= */
#particles {
    position: fixed;
    inset: 0;
    z-index: -2;
}

/* ================= GLOW BACKGROUND ================= */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,234,255,0.14), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(0,180,255,0.10), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(0,234,255,0.08), transparent 50%);
    filter: blur(22px);
    z-index: -1;
}

/* ================= NAVBAR ================= */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;

    backdrop-filter: blur(14px);
    background: rgba(8, 12, 18, 0.7);
    border-bottom: 1px solid rgba(0,234,255,0.25);
}

.logo {
    font-weight: 900;
    letter-spacing: 3px;
    color: #00eaff;
    text-transform: uppercase;
}

.menu-icon {
    font-size: 26px;
    cursor: pointer;
    color: #00eaff;
}

.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: rgba(10,15,20,0.95);
    border: 1px solid rgba(0,234,255,0.25);
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
    z-index: 9999;
}

.dropdown a {
    padding: 14px;
    color: #00eaff;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.dropdown a:hover {
    background: rgba(0,234,255,0.1);
}

/* ================= TITLE ================= */
.title {
    text-align: center;
    margin: 30px 0 10px;

    background: linear-gradient(90deg,#00eaff,#ffffff,#00eaff);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 4s linear infinite;
}

/* ================= SECTION ================= */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;

    background: rgba(0, 20, 40, 0.6);
    border: 1px solid rgba(0,234,255,0.2);
}

.section h2 {
    color: #00eaff;
}

/* ================= ROW ================= */
.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.row::-webkit-scrollbar {
    height: 6px;
}

.row::-webkit-scrollbar-thumb {
    background: #00eaff;
    border-radius: 10px;
}

/* ================= CARD ================= */
.card {
    min-width: 120px;
    position: relative;
    overflow: hidden;

    background: linear-gradient(135deg, rgba(0,234,255,0.12), rgba(0,0,0,0.85));
    border: 1px solid rgba(0,234,255,0.25);
    border-radius: 14px;
    padding: 12px;
    text-align: center;

    transition: 0.3s;
    cursor: pointer;
}

/* shimmer */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(0,234,255,0.3), transparent);
    transform: skewX(-20deg);
    animation: shimmer 4s linear infinite;
}

@keyframes shimmer {
    0% { left: -120%; }
    100% { left: 120%; }
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(0,234,255,0.4);
}

/* ================= PFP ================= */
.pfp {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 8px;
    border: 2px solid #00eaff;
    box-shadow: 0 0 10px rgba(0,234,255,0.5);
}

.pfp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ================= TEXT ================= */
.name {
    font-size: 14px;
    font-weight: bold;
}

.role {
    font-size: 11px;
    color: #aaa;
}

/* ================= OVERLAY ================= */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.overlay-content {
    background: rgba(10,15,20,0.95);
    border: 1px solid rgba(0,234,255,0.25);
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    width: 85%;
    max-width: 320px;
    box-shadow: 0 0 30px rgba(0,234,255,0.2);
}

.overlay-pfp {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 10px;
    border: 3px solid #00eaff;
}

.overlay-pfp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.close-btn {
    margin-top: 15px;
    padding: 10px;
    background: #00eaff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: black;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Exotic Esports</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="dropdown" id="menu">
        <a href="index.html">Home</a>
        <a href="phoenix.html">Phoenix Roster</a>
        <a href="phoenixmatch.html">Phoenix Schedule</a>
        <a href="cobras.html">Cobras</a>
        <a href="yetis.html">Yetis</a>
        <a href="socials.html">Socials</a>
        <a href="about.html">About</a>
    </div>
</div>

<h1 class="title">Phoenix Console Roster</h1>

<!-- YOUR CONTENT UNCHANGED BELOW -->
<!-- (everything else kept same) -->

<div class="overlay" id="overlay">
    <div class="overlay-content">
        <div class="overlay-pfp"><img id="overlayImg"></div>
        <h2 id="overlayName"></h2>
        <p id="overlayRole"></p>
        <p id="overlayBio"></p>
        <button class="close-btn" onclick="closePlayer()">Close</button>
    </div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function openPlayer(name, role, img, bio) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("overlayName").innerText = name;
    document.getElementById("overlayRole").innerText = role;
    document.getElementById("overlayBio").innerText = bio;
    document.getElementById("overlayImg").src = img;
}

function closePlayer() {
    document.getElementById("overlay").style.display = "none";
}

/* particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.5
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

        ctx.fillStyle = "rgba(0,234,255,0.6)";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
