<style>
:root {
    --pfp-size: 60px;
    --pfp-scale: 1.3;
    --overlay-size: 80px;
    --overlay-img-scale: 1.5;
}

/* ===================== GENERAL ===================== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(to bottom, #000814, #001d3d, #003566);
}

/* ===================== NAVBAR ===================== */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0, 8, 20, 0.6);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* 🔥 SHIMMER NAV LOGO */
.logo {
    font-size: 20px;
    font-weight: bold;

    background: linear-gradient(90deg,#4cc9f0,#ffffff,#4cc9f0);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 4s linear infinite;
}

.menu-icon { font-size: 24px; cursor: pointer; }

/* ===================== DROPDOWN ===================== */
.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: #001d3d;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,200,255,0.25);
    z-index: 9999;
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dropdown a:hover {
    background: #003566;
}

/* ===================== TITLE ===================== */
.title {
    text-align: center;
    color: #4cc9f0;
    margin: 30px 0 10px;

    background: linear-gradient(90deg,#4cc9f0,#ffffff,#4cc9f0);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 4s linear infinite;
}

/* ===================== SECTIONS ===================== */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0, 20, 40, 0.7);
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.15);
}

/* 🔥 CENTER + SHIMMER HEADINGS */
.section h2 {
    color: #90e0ef;
    text-align: center;

    background: linear-gradient(90deg,#4cc9f0,#ffffff,#4cc9f0);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 4s linear infinite;
}

/* ===================== ROW SCROLL ===================== */
.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.row::-webkit-scrollbar { height: 6px; }
.row::-webkit-scrollbar-thumb {
    background: #00b4d8;
    border-radius: 10px;
}

/* ===================== CARD ===================== */
.card {
    min-width: 120px;
    background: rgba(0, 40, 70, 0.85);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px #00d4ff;
}

/* ===================== PFP ===================== */
.pfp {
    width: var(--pfp-size);
    height: var(--pfp-size);
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 8px;
    border: 2px solid #00b4d8;
    box-shadow: 0 0 10px rgba(0,180,216,0.6);
    position: relative;
}

.pfp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(var(--pfp-scale));
}

/* ===================== TEXT ===================== */
.name { font-size: 14px; font-weight: bold; }
.role { font-size: 11px; color: #aaa; }

/* ===================== CENTER ===================== */
.center {
    display: flex;
    justify-content: center;
}

/* ===================== OVERLAY ===================== */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.overlay-content {
    background: #001d3d;
    padding: 25px;
    border-radius: 16px;
    width: 85%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,200,255,0.3);
}

.overlay-pfp {
    width: var(--overlay-size);
    height: var(--overlay-size);
    border-radius: 50%;
    border: 3px solid #00b4d8;
    overflow: hidden;
    margin: 0 auto 10px;
}

.overlay-pfp img {
    height: 100%;
    transform: scale(var(--overlay-img-scale));
}

.close-btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: #00b4d8;
    color: black;
    border-radius: 8px;
    cursor: pointer;
}

/* SHINE ANIMATION */
@keyframes shine {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}
</style>
</head>
