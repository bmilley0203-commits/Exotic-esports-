  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Roster</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(to bottom, #000814, #001d3d, #003566);
}

/* NAVBAR (MATCH HOME) */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #000814;
    font-weight: bold;
}

.menu-icon {
    font-size: 22px;
}

/* TITLE */
.title {
    text-align: center;
    color: #4cc9f0;
    margin: 25px 0 10px;
}

/* SECTION BLOCK */
.section {
    margin: 25px 10px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0, 20, 40, 0.6);
    box-shadow: 0 0 20px rgba(0, 200, 255, 0.15);
}

/* SECTION TITLE */
.section h2 {
    margin-bottom: 15px;
    color: #90e0ef;
}

/* HORIZONTAL SCROLL */
.row {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.row::-webkit-scrollbar {
    height: 6px;
}
.row::-webkit-scrollbar-thumb {
    background: #00b4d8;
    border-radius: 10px;
}

/* PLAYER CARD */
.card {
    min-width: 110px;
    background: rgba(0, 40, 70, 0.8);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    flex-shrink: 0;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px #00d4ff;
}

/* IMAGE */
.card img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    margin-bottom: 8px;
    border: 2px solid #00b4d8;
}

/* NAME */
.name {
    font-size: 13px;
    font-weight: bold;
}

/* ROLE */
.role {
    font-size: 11px;
    color: #aaa;
}

/* COACH CENTER */
.center {
    display: flex;
    justify-content: center;
}

</style>
</head>

<body>

<div class="navbar">
    <div>Exotic Esports</div>
    <div class="menu-icon">☰</div>
</div>

<h1 class="title">Phoenix Console Roster</h1>

<!-- COACH -->
<div class="section">
    <h2>Coach</h2>
    <div class="center">
        <div class="card">
            <img src="coach.png">
            <div class="name">Thekidrambo</div>
            <div class="role">Coach</div>
        </div>
    </div>
</div>

<!-- STARTERS -->
<div class="section">
    <h2>Starters</h2>
    <div class="row">

        <div class="card">
            <img src="spadeonics.png">
            <div class="name">Spadeonics</div>
            <div class="role">IGL</div>
        </div>

        <div class="card">
            <img src="xef.png">
            <div class="name">Xef</div>
            <div class="role">Entry</div>
        </div>

        <div class="card">
            <img src="dalton.png">
            <div class="name">Dalton</div>
            <div class="role">Entry</div>
        </div>

        <div class="card">
            <img src="golden.png">
            <div class="name">Golden</div>
            <div class="role">Flex</div>
        </div>

        <div class="card">
            <img src="chubbs.png">
            <div class="name">Chubbs</div>
            <div class="role">Flex</div>
        </div>

    </div>
</div>

<!-- SUBS -->
<div class="section">
    <h2>Subs</h2>
    <div class="row">

        <div class="card">
            <img src="placeholder.png">
            <div class="name">Nicheorange</div>
            <div class="role">IGL/Entry</div>
        </div>

        <div class="card">
            <img src="vursed.png">
            <div class="name">Vursed</div>
            <div class="role">Entry</div>
        </div>

        <div class="card">
            <img src="placeholder.png">
            <div class="name">BAMbaby</div>
            <div class="role">Flex</div>
        </div>

        <div class="card">
            <img src="placeholder.png">
            <div class="name">Bonezys</div>
            <div class="role">Flex</div>
        </div>

        <div class="card">
            <img src="placeholder.png">
            <div class="name">Fax</div>
            <div class="role">Support</div>
        </div>

    </div>
</div>

</body>
</html>
