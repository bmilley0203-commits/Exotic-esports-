.navbar {

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropbtn {
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: #062f40;
  min-width: 200px;
  border-radius: 10px;
  overflow: hidden;
}

.dropdown-content a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
}

.dropdown-content a:hover {
  background: #0a4b63;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px;
}

.header h2 {
  font-size: 32px;
}

/* ROSTER GRID */
.roster {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  padding: 20px;
}

.player-card {
  background: #062f40;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  border: 1px solid rgba(0,255,255,0.2);
  transition: 0.3s;
}

.player-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

.player-card img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.role {
  font-size: 14px;
  opacity: 0.7;
}

.section-title {
  padding: 0 20px;
  font-size: 22px;
}
