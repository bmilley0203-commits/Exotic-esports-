<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bears Roster</title>

<style>
/* ===================== VARIABLES ===================== */
:root {
    --pfp-size: 60px;
    --pfp-scale: 1.3;
    --overlay-size: 100px;
    --overlay-img-scale: 0.7;
}

/* ===================== GENERAL ===================== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(to bottom, #000814, #001d3d, #003566);
}

/* ===================== NAVBAR ===================== */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0, 8, 20, 0.6);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo { font-size: 20px; font-weight: bold; }
.menu-icon { font-size: 24px; cursor: pointer; }

/* ===================== DROPDOWN ===================== */
.dropdown {
    position: absolute;
    top: 70px;
    right: 15px;
    background: #001d3d;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    width: 200px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,200,255,0.25);
    z-index: 9999;
}

.dropdown a {
    padding: 14px;
    text-decoration: none;
    color: white;
}

.dropdown a:hover {
    background: #003566;
}

/* ===================== TITLE ===================== */
.title {
    text-align: center;
    color: #4cc9f0;
    margin: 30px 0 10px;
}

/* ===================== SECTIONS ===================== */
.section {
    margin: 20px 12px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0, 20, 40, 0.7);
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.15);
}

.section h2 {
    color: #90e0ef;
}

/* ===================== ROW ===================== */
.row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* ===================== CARD ===================== */
.card {
    min-width: 120px;
    background: rgba(0, 40, 70, 0.85);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px #00d4ff;
}

/* ===================== PFP ===================== */
.pfp {
    width: var(--pfp-size);
    height: var(--pfp-size);
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 8px;
    border: 2px solid #00b4d8;
    position: relative;
}

.pfp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(var(--pfp-scale));
}

/* ===================== TEXT ===================== */
.name { font-size: 14px; font-weight: bold; }
.role { font-size: 11px; color: #aaa; }

/* ===================== OVERLAY ===================== */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.overlay-content {
    background: #001d3d;
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    width: 85%;
    max-width: 320px;
}

/* ===================== OVERLAY PFP ===================== */
.overlay-pfp {
    width: var(--overlay-size);
    height: var(--overlay-size);
    border-radius: 50%;
    border: 3px solid #00b4d8;
    overflow: hidden;
    margin: auto;
}

.overlay-pfp img {
    height: 100%;
    transform: scale(var(--overlay-img-scale));
}

/* ===================== BUTTON ===================== */
.close-btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: #00b4d8;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Exotic Esports</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>

<div class="dropdown" id="menu">
    <a href="index.html">Home</a>
    <a href="phoenix.html">Phoenix Roster</a>
    <a href="bears.html">Bears Roster</a>
</div>

<h1 class="title">Bears Roster</h1>

<!-- STARTERS -->
<div class="section">
<h2>Starters</h2>
<div class="row">

<div class="card" onclick="openPlayer('Player1','IGL','placeholder.png','Team leader and strategist.')">
<div class="pfp"><img src="placeholder.png"></div>
<div class="name">Player1</div>
<div class="role">IGL</div>
</div>

<div class="card" onclick="openPlayer('Player2','Entry','placeholder.png','Aggressive entry fragger.')">
<div class="pfp"><img src="placeholder.png"></div>
<div class="name">Player2</div>
<div class="role">Entry</div>
</div>

<div class="card" onclick="openPlayer('Player3','Flex','placeholder.png','Flexible all-round player.')">
<div class="pfp"><img src="placeholder.png"></div>
<div class="name">Player3</div>
<div class="role">Flex</div>
</div>

</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
<div class="overlay-content">
<div class="overlay-pfp"><img id="overlayImg"></div>
<h2 id="overlayName"></h2>
<p id="overlayRole"></p>
<p id="overlayBio"></p>
<button class="close-btn" onclick="closePlayer()">Close</button>
</div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function openPlayer(name, role, img, bio) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("overlayName").innerText = name;
    document.getElementById("overlayRole").innerText = role;
    document.getElementById("overlayBio").innerText = bio;
    document.getElementById("overlayImg").src = img;
}

function closePlayer() {
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
