<!DOCTYPE html>
<html>
<head>
  <title>Cobras Matches - Exotic Esports</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
    }

    header {
      display:flex;
      justify-content:space-between;
      padding:15px 20px;
      background:#000;
      border-bottom:2px solid gold;
    }

    .dropbtn {
      background:#222;
      color:white;
      padding:10px;
      border:none;
      cursor:pointer;
    }

    .dropdown { position:relative; }

    .dropdown-content {
      display:none;
      position:absolute;
      right:0;
      background:#111;
      min-width:160px;
    }

    .dropdown-content a {
      display:block;
      padding:10px;
      color:white;
      text-decoration:none;
    }

    .dropdown:hover .dropdown-content {
      display:block;
    }

    h1, h2 {
      text-align:center;
      color:gold;
    }

    .section {
      text-align:center;
      margin-top:30px;
    }

    .match {
      margin:20px auto;
      padding:20px;
      width:400px;
      border-radius:12px;
      transition:0.2s;
      border:2px solid gold;
    }

    /* RESULT BACKGROUNDS */
    .win-bg { background:#1f5e2b; }
    .loss-bg { background:#5e1f1f; }
    .neutral-bg { background:#222; }

    .teams {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .team {
      text-align:center;
      width:35%;
    }

    .team-logo {
      width:60px;
      height:60px;
      border-radius:50%;
      background:#000;
      padding:5px;
    }

    .score {
      text-align:center;
      font-size:18px;
      font-weight:bold;
    }

    .maps {
      display:flex;
      justify-content:center;
      gap:6px;
      margin-top:8px;
    }

    .map {
      padding:4px 8px;
      border-radius:6px;
      font-size:12px;
      background:#555;
    }

    .map.win { background:#4CAF50; }
    .map.loss { background:#f44336; }
    .map.unplayed { background:#777; }

    .winner .team-logo {
      box-shadow: 0 0 15px gold;
    }

    .vod {
      margin-top:15px;
      display:none;
    }

    .vod iframe {
      width:100%;
      height:215px;
      border-radius:10px;
      border:none;
    }

    .vod-btn {
      background:#9146FF;
      color:white;
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>
  <h2>Exotic Cobras</h2>

  <div class="dropdown">
    <button class="dropbtn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="phoenix.html">Phoenix Roster</a>
      <a href="cobras.html">Cobras Roster</a>
      <a href="cobrasmatch.html">Cobras Matches</a>
      <a href="socials.html">Socials</a>
      <a href="about.html">About</a>
    </div>
  </div>
</header>

<h1>Cobras Matches</h1>

<!-- UPCOMING -->
<div class="section">
  <h2>Upcoming</h2>

  <div class="match neutral-bg">
    <div class="teams">

      <div class="team">
        <img src="cobras.png" class="team-logo">
        <p>Cobras</p>
      </div>

      <div class="score">VS</div>

      <div class="team">
        <img src="enemy.png" class="team-logo">
        <p>Enemy</p>
      </div>

    </div>

    <p>29 March - 8:30 PM</p>
    <p>BO3</p>

    <div class="maps">
      <div class="map">Kafe</div>
      <div class="map">Clubhouse</div>
      <div class="map">Chalet</div>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="section">
  <h2>Results</h2>

  <!-- LOSS -->
  <div class="match loss-bg">
    <div class="teams">

      <div class="team">
        <img src="cobras.png" class="team-logo">
        <p>Cobras</p>
      </div>

      <div class="score">
        1 - 2

        <div class="maps">
          <div class="map win">Kafe</div>
          <div class="map loss">Bank</div>
          <div class="map loss">Chalet</div>
        </div>
      </div>

      <div class="team winner">
        <img src="enemy.png" class="team-logo">
        <p>Enemy</p>
      </div>

    </div>

    <p>Winner: Enemy (BO3)</p>

    <button class="vod-btn" onclick="toggleVOD('vod1')">Watch VOD</button>

    <div id="vod1" class="vod">
      <iframe src="https://www.youtube.com/embed/Jbjy_wgpI-Q"></iframe>
    </div>
  </div>

  <!-- WIN -->
  <div class="match win-bg">
    <div class="teams">

      <div class="team winner">
        <img src="cobras.png" class="team-logo">
        <p>Cobras</p>
      </div>

      <div class="score">
        2 - 0

        <div class="maps">
          <div class="map win">Oregon</div>
          <div class="map win">Border</div>
          <div class="map unplayed">—</div>
        </div>
      </div>

      <div class="team">
        <img src="enemy.png" class="team-logo">
        <p>Enemy</p>
      </div>

    </div>

    <p>Winner: Cobras (BO3)</p>
  </div>

</div>

<script>
function toggleVOD(id) {
  const vod = document.getElementById(id);
  vod.style.display = vod.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
