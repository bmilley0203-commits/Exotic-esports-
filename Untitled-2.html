<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exotic Esports</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #050505;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    .hero img {
      width: 160px;
      margin-bottom: 20px;
      animation: scaleIn 1s ease;
    }

    .hero h1 { font-size: 3rem; }
    .hero p { color: #aaa; max-width: 500px; }

    .roster { padding: 80px 20px; text-align: center; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s;
    }

    .card:hover { transform: scale(1.05); background: #1a1a1a; }

    .avatar {
      width: 80px;
      height: 80px;
      background: #333;
      border-radius: 50%;
      margin: 0 auto 15px;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      text-align: center;
      animation: scaleIn 0.3s ease;
    }

    .close {
      margin-top: 15px;
      cursor: pointer;
      color: #00bfff;
    }

    footer {
      background: #0a0a0a;
      padding: 20px;
      text-align: center;
    }

    footer a {
      margin: 0 10px;
      text-decoration: none;
      color: white;
    }

    footer a:hover { color: #00bfff; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <!-- FIX: make sure logo.png is in SAME folder as this file -->
    <img src="./logo.png" alt="Exotic Esports Logo">
    <h1>Exotic Esports</h1>
    <p>Dominating the competition with precision, power, and teamwork.</p>
  </section>

  <!-- TEAM ROSTER -->
  <section class="roster">
    <h2>Team Roster</h2>
    <div class="grid">

      <div class="card" onclick="openModal('PlayerOne','Captain','Team leader and strategist.')">
        <div class="avatar"></div>
        <h3>PlayerOne</h3>
        <p>Captain</p>
      </div>

      <div class="card" onclick="openModal('PlayerTwo','Sniper','Long-range precision expert.')">
        <div class="avatar"></div>
        <h3>PlayerTwo</h3>
        <p>Sniper</p>
      </div>

      <div class="card" onclick="openModal('PlayerThree','Support','Keeps the team alive.')">
        <div class="avatar"></div>
        <h3>PlayerThree</h3>
        <p>Support</p>
      </div>

      <div class="card" onclick="openModal('PlayerFour','Entry','Aggressive front-line player.')">
        <div class="avatar"></div>
        <h3>PlayerFour</h3>
        <p>Entry</p>
      </div>

      <div class="card" onclick="openModal('PlayerFive','Flex','Adapts to any role.')">
        <div class="avatar"></div>
        <h3>PlayerFive</h3>
        <p>Flex</p>
      </div>

    </div>
  </section>

  <!-- MODAL -->
  <div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h2 id="modalName"></h2>
      <p id="modalRole"></p>
      <p id="modalBio"></p>
      <div class="close" onclick="closeModal()">Close</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>Follow us</p>
    <div>
      <a href="#">Twitter</a>
      <a href="#">Twitch</a>
      <a href="#">Instagram</a>
    </div>
    <p style="color: gray; margin-top: 10px;">© 2026 Exotic Esports</p>
  </footer>

  <script>
    function openModal(name, role, bio) {
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('modalName').innerText = name;
      document.getElementById('modalRole').innerText = role;
      document.getElementById('modalBio').innerText = bio;
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }
  </script>

</body>
</html>
